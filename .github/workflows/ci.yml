name: DEILE CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Roda diariamente às 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # 3.11 = versão da imagem de produção (Dockerfile PYTHON_VERSION=3.11.10).
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Testes de infra (cli_worker_repo_cycle) fazem `git commit` REAL em repos
      # temporários; o runner não tem identidade git global, causando
      # "Author identity unknown" (rc=128). Configura uma identidade de CI.
      - name: Configure git identity (testes que commitam)
        run: |
          git config --global user.email "ci@deile.local"
          git config --global user.name "DEILE CI"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instala a partir do pyproject.toml (fonte de verdade das deps), não
          # do requirements.txt — que estava dessincronizado e sem deps core
          # (ex.: aiohttp), causando 59 erros de coleção no pytest. Extras:
          # test (plugins pytest) + otel (opentelemetry, exigido pelos testes de
          # observability). ZERO TEATRO: a suíte tem que COLETAR e rodar de verdade.
          pip install -e ".[test,otel]"
          pip install pytest-cov pytest-xdist pytest-mock coverage

      - name: Run tests
        run: |
          pytest deile/tests/ -q --cov=deile --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r deile/ -f json -o bandit-report.json || true
          bandit -r deile/ || true
        continue-on-error: true

      - name: Check for known security vulnerabilities
        run: |
          safety check --json || echo "Safety check completed"
        continue-on-error: true

  code-quality:
    # GATE efetivo — sem continue-on-error.
    # Falha bloqueia merge. Ratchet: erros só podem diminuir.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          pip install black==26.5.1 isort==8.0.1 ruff==0.15.17 radon mypy mypy-baseline interrogate

      # --- GATE: formatação (falha se código não está normalizado) ---
      - name: Gate — black --check
        run: black --check deile/

      - name: Gate — isort --check-only
        run: isort --check-only deile/

      - name: Gate — ruff check
        run: ruff check deile/

      # --- GATE: complexidade ciclomática ---
      # Baseline: média A (3.24). Teto: B (média ≤ 10.0).
      # Se a média subir para B ou pior, o gate falha.
      # Ratchet: ao atingir A consistentemente, abaixe o teto para A (<= 5).
      - name: Gate — radon CC (média ≤ B)
        run: |
          AVG=$(radon cc deile/ -a | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "Complexidade ciclomática média: $AVG"
          python3 -c "
          avg = float('$AVG')
          # B = CC entre 6 e 10; A = CC <= 5
          # Teto inicial: B (avg <= 10). Baseline medido: 3.24 (A).
          if avg > 10.0:
              raise SystemExit(f'Complexidade média {avg:.2f} excede teto B (10.0). Refatore antes de mergear.')
          print(f'OK: complexidade média {avg:.2f} dentro do teto B (10.0)')
          "

      # --- GATE: mypy escalonado via baseline ---
      # Estratégia: mypy-baseline (registra 617 erros como baseline; gate só
      # em erros NOVOS). Ratchet: o arquivo mypy-baseline.txt só pode encolher.
      # Para atualizar o baseline após correções: mypy deile/ --ignore-missing-imports | mypy-baseline sync
      - name: Gate — mypy (apenas erros novos vs baseline)
        run: |
          pip install -e ".[test,otel]" -q
          mypy deile/ --ignore-missing-imports | mypy-baseline filter
        # mypy-baseline filter: exit 0 se nenhum erro NOVO; exit 1 se há regressão.

      # --- GATE: cobertura de docstrings ---
      # Baseline: 39.9%. Threshold inicial: 39% (margem 1 ponto).
      # Ratchet: só pode aumentar. Config em pyproject.toml [tool.interrogate].
      - name: Gate — interrogate (docstring coverage >= 39%)
        run: interrogate deile/ --config pyproject.toml

      # --- Relatório informativo de complexidade MI (não bloqueia) ---
      - name: Info — radon MI report (não bloqueia)
        run: radon mi deile/ --min B
        continue-on-error: true

  functional-tests:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,otel]"

      - name: Test DEILE CLI basic functionality
        run: |
          python -m deile --version || echo "Version command test"
          python -m deile --help || echo "Help command test"
        continue-on-error: true

      - name: Test configuration loading
        run: |
          python -c "from deile.config.manager import ConfigManager; cm = ConfigManager(); print('Config loading: OK')"
        continue-on-error: true

      - name: Test core components initialization
        run: |
          python -c "
          try:
              from deile.core.agent import Agent
              from deile.tools.registry import ToolRegistry
              from deile.commands.registry import CommandRegistry
              print('Core components: OK')
          except Exception as e:
              print(f'Core components error: {e}')
          "
        continue-on-error: true

  performance-tests:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,otel]"
          pip install pytest-benchmark

      - name: Run performance benchmarks
        run: |
          pytest deile/tests/ -k "performance or benchmark" --benchmark-only || echo "Performance tests completed"
        continue-on-error: true

  build-and-package:
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build package
        run: |
          python -m build
        continue-on-error: true

      - name: Check package
        run: |
          pip install twine
          twine check dist/* || echo "Package check completed"
        continue-on-error: true

  documentation:
    # GATE efetivo — sem continue-on-error nos steps críticos.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install documentation tools
        run: |
          pip install pymarkdownlnt

      # --- GATE: estrutura básica de markdown ---
      # Config em .pymarkdown (desabilita MD013/MD024/MD040 e outros ruidosos;
      # ativa MD001 heading levels, MD041 first heading e integridade estrutural).
      - name: Gate — markdown lint (docs/system_design/)
        run: pymarkdown scan docs/system_design/

      # --- GATE: consistência doc↔código ---
      # Verifica invariantes declarados nos docs vs realidade do código:
      # - --cov-fail-under existe em pytest.ini/pyproject.toml/ci.yml
      # - links cruzados de docs/system_design/ apontam para arquivos existentes
      # - ci.yml contém gate pytest
      - name: Gate — consistência doc↔código
        run: python scripts/validate_doc_consistency.py

      # --- GATE: README existe ---
      - name: Gate — README.md existe
        run: test -f README.md

      # --- Informativo: lista docs (não bloqueia) ---
      - name: Info — lista documentos do sistema
        run: find docs/ -name "*.md" | sort
        continue-on-error: true

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: [test, security-scan, code-quality, functional-tests, documentation]
    if: failure()
    steps:
      - name: Notify on failure
        run: |
          echo "CI Pipeline falhou. Verifique os logs para detalhes."
          echo "Jobs com falha precisam de atenção antes do merge."

  deployment-ready:
    runs-on: ubuntu-latest
    needs:
      [test, security-scan, code-quality, functional-tests, build-and-package, documentation]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Mark as deployment ready
        run: |
          echo "Todos os checks passaram! Pronto para deploy."
          echo "Version: $(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "Branch: ${{ github.ref }}"

# Environment variables for all jobs
env:
  PYTHONPATH: ${{ github.workspace }}
  DEILE_LOG_LEVEL: DEBUG
  DEILE_TEST_MODE: true
