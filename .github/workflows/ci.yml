name: DEILE CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: "0 2 * * *"

# Permissões mínimas por padrão (princípio do menor privilégio).
# Jobs que precisam de mais declaram localmente via permissions:.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # SECRET SCANNING — gating; bloqueia em segredo novo fora da allowlist
  # ──────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Histórico completo para varredura full-history
          fetch-depth: 0

      - name: Gitleaks — varredura de segredos (GATING)
        # gitleaks/gitleaks-action v2
        # SHA do commit apontado pela tag anotada v2 (resolvido em 2026-06-15):
        #   tag object: dcedce43c6f43de0b836d1fe38946645c9c638dc
        #   commit:     ff98106e4c7b2bc287b24eaf42907196329070c7
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # .gitleaks.toml na raiz do repo define a allowlist de FPs em arquivos
          # de teste — veja o arquivo para a lista e justificativa por arquivo.
          GITLEAKS_CONFIG: .gitleaks.toml
          # exit-code=1 garante que o job falhe se houver achado fora da allowlist
          GITLEAKS_EXIT_CODE: 1

  # ──────────────────────────────────────────────────────────────────────────
  # SECURITY SCAN — gating: bandit HIGH + pip-audit CVE
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install project + security tools
        run: |
          python -m pip install --upgrade pip
          # Instala o projeto para que pip-audit veja as deps reais (pyproject.toml)
          pip install -e ".[test,otel]"
          pip install bandit pip-audit

      # BANDIT — SAST gating em severidade HIGH
      # Resultado da varredura inicial (2026-06-15): zero achados HIGH.
      # Sem baseline necessário — qualquer HIGH novo bloqueia diretamente.
      - name: Bandit — SAST HIGH severity (GATING)
        run: |
          bandit -r deile/ -lll

      # PIP-AUDIT — CVE gating
      # Achado legado allowlistado (2026-06-15):
      #   CVE-2025-71176 / GHSA-6w46-j5rx-g56g — pytest 8.4.2
      #   Descrição: local DoS/privilege escalation via /tmp/pytest-of-{user}
      #   Risco prático: nulo em CI (runner descartável, sem usuários concorrentes)
      #   Fix disponível: pytest >=9.0.3 — allowlistar até atualização planejada
      - name: pip-audit — CVE check (GATING)
        run: |
          pip-audit --ignore-vuln GHSA-6w46-j5rx-g56g

  # ──────────────────────────────────────────────────────────────────────────
  # TESTES — gating: suíte completa + cobertura ≥85%
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest]
        # 3.11 = versão da imagem de produção (Dockerfile PYTHON_VERSION=3.11.10).
        python-version: ["3.11"]

    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Testes de infra (cli_worker_repo_cycle) fazem `git commit` REAL em repos
      # temporários; o runner não tem identidade git global, causando
      # "Author identity unknown" (rc=128). Configura uma identidade de CI.
      - name: Configure git identity (testes que commitam)
        run: |
          git config --global user.email "ci@deile.local"
          git config --global user.name "DEILE CI"

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        # actions/cache v4
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instala a partir do pyproject.toml (fonte de verdade das deps), não
          # do requirements.txt — que estava dessincronizado e sem deps core
          # (ex.: aiohttp), causando 59 erros de coleção no pytest. Extras:
          # test (plugins pytest) + otel (opentelemetry, exigido pelos testes de
          # observability). ZERO TEATRO: a suíte tem que COLETAR e rodar de verdade.
          pip install -e ".[test,otel]"
          pip install pytest-cov pytest-xdist pytest-mock coverage

      # Gate de cobertura: medido 87% em 2026-06-15; gate em 85% com margem.
      # --cov-fail-under=85 é o gate real — o CI falha se a cobertura cair abaixo.
      - name: Run tests
        run: |
          # -n auto: paraleliza em todos os cores (pytest-xdist instalado acima); pytest-cov combina a cobertura entre workers.
          pytest deile/tests/ -q -n auto \
            --cov=deile \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        # codecov/codecov-action v4
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # QUALIDADE DE CÓDIGO — GATING; bloqueia merge em regressão
  #
  # Ratchet: cada gate só pode encolher (erros/violações só podem diminuir).
  # ──────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code quality (GATING)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          pip install black==26.5.1 isort==8.0.1 ruff==0.15.17 radon interrogate mypy mypy-baseline

      # --- GATE: formatação (falha se código não está normalizado) ---
      # Baseline: 817 arquivos reformatados no commit de normalização.
      # Verde significa que nenhum arquivo saiu do padrão desde então.
      - name: Gate — black --check (GATING)
        run: black --check deile/

      # --- GATE: ordenação de imports ---
      - name: Gate — isort --check-only (GATING)
        run: isort --check-only deile/

      # --- GATE: linting E/F/W (config em pyproject.toml [tool.ruff.lint]) ---
      # Baseline: 62 violações ignoradas por categoria (E741/E402/E501/F841).
      # Ratchet: a lista ignore só pode encolher.
      - name: Gate — ruff check (GATING)
        run: ruff check deile/

      # --- GATE: complexidade ciclomática ---
      # Baseline medido em 2026-06-16: média A (3.24). Teto: B (avg ≤ 10.0).
      # Ratchet: ao atingir A consistentemente, abaixe o teto para ≤ 5.
      - name: Gate — radon CC média ≤ B (GATING)
        run: |
          AVG=$(radon cc deile/ -a | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "Complexidade ciclomática média: $AVG"
          python3 -c "
          avg = float('$AVG')
          if avg > 10.0:
              raise SystemExit(f'Complexidade média {avg:.2f} excede teto B (10.0). Refatore antes de mergear.')
          print(f'OK: complexidade média {avg:.2f} dentro do teto B (10.0)')
          "

      # --- GATE: mypy via mypy-baseline ---
      # Baseline: 617 erros registrados em mypy-baseline.txt (2026-06-16).
      # Gate falha APENAS em erros novos (erros do baseline passam).
      # Para atualizar o baseline após correções:
      #   mypy deile/ --ignore-missing-imports | mypy-baseline sync
      # Ratchet: mypy-baseline.txt só pode encolher (menos linhas = menos erros).
      - name: Install project deps (mypy precisa dos stubs/tipos)
        run: pip install -e ".[test,otel]" -q

      - name: Gate — mypy apenas erros novos vs baseline (GATING)
        run: mypy deile/ --ignore-missing-imports | mypy-baseline filter

      # --- GATE: cobertura de docstrings ---
      # Baseline medido em 2026-06-16: 39.9%. Threshold: 39% (margem 1 ponto).
      # Config em pyproject.toml [tool.interrogate] (fail-under no CI).
      # Ratchet: só pode aumentar.
      - name: Gate — interrogate docstring coverage ≥ 39% (GATING)
        run: interrogate deile/ --config pyproject.toml --fail-under 39

      # --- Radon MI — informativo apenas (não bloqueia) ---
      - name: Info — radon MI (não bloqueia)
        run: radon mi deile/ --min B
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # TESTES FUNCIONAIS — GATING (issue #730)
  #
  # Comprova que o artefato wheel inicializa corretamente:
  #   1. Builda o wheel (fonte de verdade do artefato publicável).
  #   2. Instala em venv limpo — sem editable, sem source tree.
  #   3. `deile --version` e `deile --help` devem sair com exit 0.
  #   4. Imports dos registries core (tools, commands) e ConfigManager devem
  #      funcionar — garantia de que a descoberta automática não quebrou.
  # Qualquer falha aqui bloqueia o merge.
  # ──────────────────────────────────────────────────────────────────────────
  functional-tests:
    name: Functional tests (GATING)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/func-venv
          /tmp/func-venv/bin/pip install --upgrade pip
          # --force-reinstall + --no-cache-dir: garante que o PRÓPRIO pacote deile
          # seja instalado a partir do wheel (não só suas deps) — defende contra
          # pip considerar o pacote "já satisfeito"/cacheado e pular o top-level.
          /tmp/func-venv/bin/pip install --force-reinstall --no-cache-dir "$(ls dist/*.whl)"
          # Verificação loud: falha o gate se o pacote deile não entrou no venv.
          /tmp/func-venv/bin/pip show deile

      - name: CLI smoke — deile --version (exit 0 obrigatório)
        run: /tmp/func-venv/bin/python -m deile --version

      - name: CLI smoke — deile --help (exit 0 obrigatório)
        run: /tmp/func-venv/bin/python -m deile --help

      - name: Registry imports e ConfigManager
        run: |
          /tmp/func-venv/bin/python - <<'EOF'
          from deile.tools.registry import ToolRegistry
          from deile.commands.registry import CommandRegistry
          from deile.config.manager import ConfigManager
          ConfigManager()
          print("registries + ConfigManager OK")
          EOF

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD — GATING (issue #730)
  #
  # Garante que o artefato de distribuição e a imagem Docker estão saudáveis:
  #   1. `python -m build` gera wheel + sdist sem erros.
  #   2. `twine check dist/*` valida metadados PyPI.
  #   3. Smoke de install-from-wheel em venv limpo.
  #   4. Cada extra offline ([test], [otel], [scheduler], [webhook], [ui])
  #      resolve em venv limpo (princípio arquitetural #14).
  #      A extra [bot] depende de git URL externa (elimarcavalli/deilebot) e
  #      requer BOT_REPO_TOKEN — testada no workflow install-smoke.yml dedicado.
  #   5. Docker build da imagem REAL deile-stack:local (clone do deilebot +
  #      WITH_BOT=1, espelhando a produção) + smoke de import dos módulos dos
  #      pods. Cache de layers via type=gha.
  # Qualquer falha aqui bloqueia o merge.
  # ──────────────────────────────────────────────────────────────────────────
  build-and-package:
    name: Build & package (GATING)
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist (GATE)
        run: python -m build

      - name: twine check (GATE)
        run: twine check dist/*

      - name: Install wheel em venv limpo (smoke)
        run: |
          python -m venv /tmp/pkg-venv
          /tmp/pkg-venv/bin/pip install --upgrade pip
          # --force-reinstall + --no-cache-dir: garante o install do pacote deile
          # do wheel (não só deps). pip show falha alto se o pacote não entrou.
          /tmp/pkg-venv/bin/pip install --force-reinstall --no-cache-dir "$(ls dist/*.whl)"
          /tmp/pkg-venv/bin/pip show deile
          /tmp/pkg-venv/bin/python -c "import deile; print('wheel import OK')"
          /tmp/pkg-venv/bin/python -m deile --version

      # Testa resolução de cada extra offline em venv isolado.
      # [bot] é propositalmente excluído: depende de git URL externa
      # (elimarcavalli/deilebot) e requer BOT_REPO_TOKEN — cobre o install-smoke.yml.
      # Usa $(ls dist/*.whl) para obter o path exato antes de concatenar o sufixo
      # de extra — `dist/*.whl[extra]` em bash trata [...] como glob char-class.
      - name: Extras offline — [test] (GATE)
        run: |
          WHEEL=$(ls dist/*.whl)
          python -m venv /tmp/extra-test
          /tmp/extra-test/bin/pip install --upgrade pip
          /tmp/extra-test/bin/pip install "${WHEEL}[test]"

      - name: Extras offline — [otel] (GATE)
        run: |
          WHEEL=$(ls dist/*.whl)
          python -m venv /tmp/extra-otel
          /tmp/extra-otel/bin/pip install --upgrade pip
          /tmp/extra-otel/bin/pip install "${WHEEL}[otel]"

      - name: Extras offline — [scheduler] (GATE)
        run: |
          WHEEL=$(ls dist/*.whl)
          python -m venv /tmp/extra-scheduler
          /tmp/extra-scheduler/bin/pip install --upgrade pip
          /tmp/extra-scheduler/bin/pip install "${WHEEL}[scheduler]"

      - name: Extras offline — [webhook] (GATE)
        run: |
          WHEEL=$(ls dist/*.whl)
          python -m venv /tmp/extra-webhook
          /tmp/extra-webhook/bin/pip install --upgrade pip
          /tmp/extra-webhook/bin/pip install "${WHEEL}[webhook]"

      - name: Extras offline — [ui] (GATE)
        run: |
          WHEEL=$(ls dist/*.whl)
          python -m venv /tmp/extra-ui
          /tmp/extra-ui/bin/pip install --upgrade pip
          /tmp/extra-ui/bin/pip install "${WHEEL}[ui]"

      # ------------------------------------------------------------------
      # Docker build da imagem de produção (GATE)
      #
      # O Dockerfile usa --mount=type=bind,source=deilebot no builder e faz um
      # COPY incondicional de /build/deilebot no stage final — que só existe com
      # WITH_BOT=1. Por isso buildamos a imagem REAL: clone do deilebot + WITH_BOT=1
      # (espelha deploy.py:397, que usa WITH_BOT=1 quando deilebot/ está presente).
      #
      # Cache de layers: usamos o cache embutido do buildx (type=gha) para
      # reutilizar camadas de pip install entre runs (a camada mais pesada).
      # Mesmo sem cache pré-aquecido o build conclui em ~5 min no runner.
      # ------------------------------------------------------------------
      # Clona o deilebot/ no contexto e builda WITH_BOT=1 — a imagem REAL de
      # produção (deploy.py:397 usa WITH_BOT=1 quando deilebot/ existe). O bind
      # mount do Dockerfile exige deilebot/ presente; o COPY final de
      # /build/deilebot só existe com WITH_BOT=1.
      - name: Clona deilebot/ no contexto (imagem real, WITH_BOT=1)
        env:
          BOT_REPO_TOKEN: ${{ secrets.BOT_REPO_TOKEN }}
        run: |
          if [ -z "$BOT_REPO_TOKEN" ]; then
            echo "::error::BOT_REPO_TOKEN ausente — necessário para clonar deilebot e buildar a imagem real (WITH_BOT=1)"
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${BOT_REPO_TOKEN}@github.com/elimarcavalli/deilebot.git" deilebot
          test -d deilebot/deilebot || { echo "::error::clone do deilebot incompleto"; exit 1; }

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build imagem Docker deile-stack:local (GATE)
        # docker/build-push-action v6
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: deile-stack:local
          build-args: |
            WITH_BOT=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker smoke — import deile (GATE)
        run: |
          docker run --rm deile-stack:local \
            /venv/bin/python -c "import deile; print('deile import OK')"

      - name: Docker smoke — módulos dos pods (GATE)
        run: |
          docker run --rm deile-stack:local \
            /venv/bin/python -c "
          import deile
          import importlib, sys
          # Módulos críticos dos pods (worker, claude-worker, pipeline, bot)
          core_mods = [
              'deile.tools.registry',
              'deile.commands.registry',
              'deile.config.manager',
              'deile.orchestration.pipeline.dispatch_resolver',
              'deile.orchestration.pipeline.model_resolver',
              'deile.orchestration.pipeline.reasoning_resolver',
          ]
          for mod in core_mods:
              importlib.import_module(mod)
          print('pod module imports OK')
          "

  # ──────────────────────────────────────────────────────────────────────────
  # DOCUMENTAÇÃO — GATING; bloqueia merge em inconsistência doc↔código
  #
  # Gates:
  #   1. validate_doc_consistency.py: invariantes arquiteturais (cross-refs,
  #      gate de cobertura no ci.yml, pytest presente). Ver scripts/.
  #   2. pymarkdown: lint de Markdown nos docs de system_design.
  #   3. markdown-link-check: dead links nos docs (continua em advisory para
  #      links externos — pode quebrar por rate-limit/timeout externo).
  # ──────────────────────────────────────────────────────────────────────────
  documentation:
    name: Documentation (GATING)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install doc tools
        run: pip install pymarkdownlnt

      # --- GATE: consistência doc↔código (GATING) ---
      # Verifica: --cov-fail-under está no ci.yml (não no pytest.ini),
      # links relativos entre docs/system_design/ resolvem, pytest presente.
      - name: Gate — consistência doc↔código (GATING)
        run: python3 scripts/validate_doc_consistency.py

      # --- Advisory: lint de Markdown nos docs (não bloqueia no momento) ---
      # Baseline de violações existentes em 2026-06-16: ~40 (MD028/MD031/MD032/
      # MD040/MD038/MD022/MD024/MD004 nos docs de system_design/). O gate de lint
      # de Markdown é advisory até que os docs sejam normalizados em PR dedicada.
      # Ratchet: ao zerar as violações, remover o continue-on-error e converter
      # em gate real. Regras desativadas permanentemente:
      #   MD013 (linha longa) — tabelas são necessariamente largas
      #   MD033 (HTML inline) — usado em alguns docs
      #   MD041 (primeiro elemento não é H1) — docs de suporte
      - name: Info — pymarkdown lint docs/system_design/ (advisory)
        run: |
          pymarkdown --config .pymarkdown scan docs/system_design/
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # NOTIFICAÇÃO DE FALHA
  # ──────────────────────────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [test, secret-scan, security-scan, code-quality, functional-tests, documentation]
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Notify on failure
        run: |
          echo "CI Pipeline failed. Check the logs for details."
          echo "Failed jobs need attention before merging."

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOYMENT READY — só em main; requer gates de segurança passando
  # ──────────────────────────────────────────────────────────────────────────
  deployment-ready:
    name: Deployment ready
    runs-on: ubuntu-latest
    needs:
      [test, secret-scan, security-scan, code-quality, functional-tests, build-and-package, documentation]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Mark as deployment ready
        run: |
          echo "All checks passed! Ready for deployment."
          echo "Version: $(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "Branch: ${{ github.ref }}"

# Environment variables for all jobs
env:
  PYTHONPATH: ${{ github.workspace }}
  DEILE_LOG_LEVEL: DEBUG
  DEILE_TEST_MODE: true
