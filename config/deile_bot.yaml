# Example config for deile_bot. Copy to config/deile_bot.yaml and edit.

foundation:
  sqlite_path: data/deile_bot.sqlite
  sessions_sqlite_path: data/deile_sessions.sqlite
  data_retention_days: 90
  default_persona: developer
  intent_classifier: heuristic
  agent_bridge_mode: in_process
  agent_invocation_timeout_seconds: 600
  rate_limit_user_burst: 5
  rate_limit_user_refill_per_minute: 30
  rate_limit_global_concurrent: 16
  audit_log_to_file: true
  metrics_enabled: true
  log_dir: data/logs
  session_strategy: per_user

permissions:
  # ULIDs from data/deile_bot.sqlite — discord:1475913578648436909 (elimar) + discord:1244112295261503573 (ZeZiNHo_HiPPie)
  owners:
    - "01KQMMWKRHG0HJD6PQ7J2S8JY4"
    - "01KQMNJQ24GNA1X2RQ4VHTQSCH"
  allowlist_invoke_agent: ["*"]
  blocklist: []
  per_action:
    EXECUTE_TOOL: { mode: owner_only }
    SEND_DM: { mode: allowlist, list: ["*"] }
    ADMIN_COMMAND: { mode: owner_only }
    DEBUG_COMMAND: { mode: owner_only }

personas:
  default: developer
  rules:
    - when: { provider: discord, scope: DM }
      use: discord_developer
    - when: { provider: discord, scope: GROUP, channel_name_in: ["geral"] }
      use: developer

providers:
  enabled_providers: ["discord"]
