apiVersion: apps/v1
kind: Deployment
metadata:
  name: deilebot
  namespace: deile
  labels:
    app: deilebot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deilebot
  template:
    metadata:
      labels:
        app: deilebot
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: deilebot
          image: deile-stack:local
          imagePullPolicy: Never
          # Run from /home/deile so deile's SQLiteTaskManager (which
          # defaults to `./deile_tasks.db`) lands on a writable tmpfs
          # rather than the read-only image rootfs.
          workingDir: /home/deile
          # ENTRYPOINT is `tini --` from the image; `args` becomes the
          # rest of the command line.
          args: ["python3", "/app/wrapper.py", "bot", "run", "--provider", "discord"]
          env:
            - name: HOME
              value: /home/deile
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            # Pod's foundation paths — point sqlite + logs at writable
            # tmpfs volumes; the rest of the FS is read-only.
            # `FoundationSettings` uses env_prefix=DEILE_BOT_ so the
            # field name maps to env without the FOUNDATION_ infix.
            - name: DEILE_BOT_SQLITE_PATH
              value: /home/deile/data/deilebot.sqlite
            - name: DEILE_BOT_SESSIONS_SQLITE_PATH
              value: /home/deile/data/deile_sessions.sqlite
            - name: DEILE_BOT_LOG_DIR
              value: /home/deile/logs
            - name: DEILE_BOT_AUDIT_LOG_TO_FILE
              value: "true"
            # Control-plane bind config. Host MUST be 0.0.0.0 inside the
            # container so the K8s Service can reach it; NetworkPolicy
            # restricts who can actually connect.
            - name: DEILE_BOT_CONTROL_PLANE_HOST
              value: "0.0.0.0"
            - name: DEILE_BOT_CONTROL_PLANE_PORT
              value: "8765"
            - name: DEILE_BOT_CONTROL_PLANE_ENABLED
              value: "true"
            # Self-loopback endpoint so the bot's embedded agent can
            # register the messaging tools (their is_configured check
            # only requires endpoint+token to be set; the bot does not
            # actually HTTP to itself — outbound Discord ops go via the
            # in-process adapter through the egress pipeline).
            - name: DEILE_BOT_ENDPOINT
              value: "http://deilebot.deile.svc.cluster.local:8765"
            # Worker control-plane (where dispatch_deile_task posts).
            - name: DEILE_WORKER_ENDPOINT
              value: "http://deile-worker.deile.svc.cluster.local:8766"
            # Auto-start CronRunner on bot boot. Without this, /agendar
            # creates entries no DB mas nunca dispara — runner fica off.
            - name: DEILE_CRON_AUTOSTART
              value: "1"
            # ``cron.db_path`` (= /home/deile/data/cron.db) vem por dois
            # caminhos convergentes:
            #   1. ``deilebot/cli.py`` + ``providers/discord/adapter.py``
            #      leem ``os.environ.get("DEILE_CRON_DB_PATH", "data/cron.db")``
            #      — sem a env var, caem no default ``data/cron.db`` que
            #      ``workingDir=/home/deile`` resolve para o mesmo path.
            #   2. ``deile.config.settings`` (importado pelo bot ao registrar
            #      messaging tools) lê ``cron.db_path`` do JSON layered
            #      apontado por DEILE_SETTINGS_FILE → bot-settings.json no
            #      ConfigMap (manifest 47).
            # Removemos ``DEILE_CRON_DB_PATH`` do env porque ela é
            # depreciada (issue #111) e fica obsoleta com os dois caminhos
            # acima — sem a remoção, o boot do deile importado pelo bot
            # emitiria WARNING a cada restart.
            - name: DEILE_SETTINGS_FILE
              value: "/etc/deile/settings.json"
          ports:
            - name: control-plane
              containerPort: 8765
              protocol: TCP
          volumeMounts:
            - name: bot-secrets
              mountPath: /run/secrets/bot
              readOnly: true
            # Worker bearer token mirror — bot reads it to authenticate
            # against the worker's :8766 control plane.
            - name: worker-bearer
              mountPath: /run/secrets/bot/worker
              readOnly: true
            # /home/deile generic emptyDir (logs, cache, etc.).
            - name: home
              mountPath: /home/deile
            # /home/deile/data is the PVC where conversation sqlite,
            # audit log, sessions and cron schedules live — must
            # survive restarts.
            - name: data
              mountPath: /home/deile/data
            - name: tmp
              mountPath: /tmp
            # The bot reads ./config/deilebot.yaml relative to cwd
            # (=/home/deile thanks to workingDir). subPath pins one
            # file so /home/deile/config can stay otherwise empty.
            - name: bot-config
              mountPath: /home/deile/config/deilebot.yaml
              subPath: deilebot.yaml
              readOnly: true
            # DEILE settings layered (issue #111) — ver DEILE_SETTINGS_FILE.
            # Mantém ``~/.deile/`` writable pra logs/runs/sessions do DEILE
            # importado por messaging tools.
            - name: runtime-config
              mountPath: /etc/deile/settings.json
              subPath: bot-settings.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v1/health
              port: control-plane
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: control-plane
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "192Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: bot-secrets
          secret:
            secretName: bot-secrets
            # 0o440 (decimal 288) — owner (root) + group (fsGroup=10001)
            # may read; world denied. Octal form is unreliable through
            # Go's YAML→JSON conversion, hence decimal.
            defaultMode: 288
        - name: worker-bearer
          secret:
            secretName: worker-bearer
            defaultMode: 288
        - name: bot-config
          configMap:
            name: bot-config
            defaultMode: 292   # 0o444 — read-only, world readable inside pod
        - name: runtime-config
          configMap:
            name: deile-runtime-config
            defaultMode: 292   # 0o444
        # /home/deile is ephemeral (logs, cache).
        - name: home
          emptyDir:
            sizeLimit: "128Mi"
        # /home/deile/data is PERSISTENT — conversation history, audit
        # log, cron schedules, deile sessions. Survives restart/rollout.
        - name: data
          persistentVolumeClaim:
            claimName: deilebot-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "32Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: deilebot
  namespace: deile
  labels:
    app: deilebot
spec:
  type: ClusterIP
  selector:
    app: deilebot
  ports:
    - name: control-plane
      port: 8765
      targetPort: control-plane
      protocol: TCP
