# claude-creds-renewer — ServiceAccount + RBAC para operações de scaling
# da frota CLI (ensure-replica on-demand, Decisão #51).
#
# Issue #603: o CronJob de renovação OAuth (claude-credentials-renew) foi
# REMOVIDO. Com ``claude setup-token``, o token tem validade de ~1 ano —
# renovação automática a cada 4h é desnecessária. O operador deve rodar
# ``deploy.py k8s claude-setup-token`` ~1×/ano quando o token expirar.
#
# Este arquivo mantém APENAS o ServiceAccount + Role + RoleBinding porque
# a frota multi-CLI (Decisão #51) usa este SA para scale 0→1 on-demand
# (ensure-replica) dos workers. Remover o SA quebraria o scaling automático.
#
# RBAC: permissão mínima — get/patch de Deployment para scale +
# get/patch/create do Secret ``claude-credentials`` para setup-token updates.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-creds-renewer
  namespace: deile
  labels:
    app: claude-creds-renewer
    role: deile
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-creds-renewer
  namespace: deile
  labels:
    app: claude-creds-renewer
    role: deile
rules:
  # 1. exec no pod claude-worker (para ler credentials.json in-pod).
  # `resourceNames` não é honrado em pods/exec — o app-layer
  # (_claude_creds_refresh.py) endereça `deploy/claude-worker` explicitamente.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # 2. get/patch/create do Secret ``claude-credentials`` SOMENTE.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "create"]
    resourceNames: ["claude-credentials"]
  # 3. Necessário para ``kubectl get deployment/claude-worker`` (resolver pod).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
    resourceNames: ["claude-worker"]
  # 4. Ensure-replica on-demand dos CLI workers da frota (plano B5): o pipeline
  #    escala ``<kind>-worker`` 0→1 antes de despachar. Sem ``resourceNames``
  #    porque a frota cresce dinamicamente (novos kinds via gen-worker); o escopo
  #    é o namespace ``deile`` e a única ação é ``scale`` (sem create/delete).
  #    Sem este RBAC o ensure-replica cai no fallback ``WORKER_SCALED_TO_ZERO``
  #    (erro instrutivo "rode k8s scale --<kind>-worker 1"), não em crash.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-creds-renewer
  namespace: deile
  labels:
    app: claude-creds-renewer
    role: deile
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-creds-renewer
subjects:
  - kind: ServiceAccount
    name: claude-creds-renewer
    namespace: deile

# CronJob claude-credentials-renew foi REMOVIDO (issue #603).
# Token de 1 ano via setup-token não precisa de renovação automática.
# Rode `deploy.py k8s claude-setup-token` quando o token expirar (~1×/ano).
