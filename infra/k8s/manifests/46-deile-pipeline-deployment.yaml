# deile-pipeline — long-running pod that drives the autonomous
# issue → review → implement → PR → review → merge loop (PipelineMonitor).
#
# It ORCHESTRATES only: it lists/labels issues + PRs via the `gh` CLI and
# dispatches the heavy implement/review work to the deile-worker Pod over
# HTTP (DEILE_PIPELINE_DISPATCH_MODE=deile_worker — "DEILE-to-DEILE"). It runs
# NO LLM in-process, so it needs GITHUB_TOKEN (gh) and the worker bearer (to
# dispatch), but no provider bootstrap and no embedded agent.
#
# Jail posture mirrors deile-worker: readOnlyRootFilesystem, drop ALL caps,
# uid 10001, PSS restricted, secrets as files. NetworkPolicy: egress to the
# worker:8766 (rule 6), to the bot:8765 (notifier, via role=deile) and 443
# (gh → github, via role=deile). No ingress is opened — nothing calls it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deile-pipeline
  labels:
    app: deile-pipeline
    role: deile        # inherits deile-egress-to-bot (8765) + deile-egress-https-llm (443)
spec:
  replicas: 1
  strategy: { type: Recreate }   # single monitor: never run two at once (PID lock + label races)
  selector:
    matchLabels:
      app: deile-pipeline
      role: deile
  template:
    metadata:
      labels:
        app: deile-pipeline
        role: deile
    spec:
      # Decisão #46 — auto-renew do OAuth do claude-worker direto do
      # pipeline pod. Sem isso, o pipeline reportava ``WORKER_AUTH_EXPIRED``
      # e ficava preso até o humano rodar ``deploy.py k8s claude-renew``.
      # Reusa a SA ``claude-creds-renewer`` (manifest 51) que já tem RBAC
      # mínimo: pods/exec no claude-worker + get/patch do Secret
      # ``claude-credentials``. Sem isso, o subprocess ``kubectl exec``
      # falha com 403 (forbidden) e o refresh degrada para o caminho
      # determinístico de bloqueio.
      serviceAccountName: claude-creds-renewer
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      # InitContainer: clona o repo alvo em /home/deile se ainda não estiver
      # presente. O pipeline ESPERA estar dentro de um git repo com
      # ``deile.py`` no root (resolve_base_path em
      # ``deile/tools/_pipeline_paths.py``). Sem isso, ``WorktreeManager``
      # crasha com "is not a git repository" no startup.
      #
      # Idempotente: se ``.git`` já existe (rollout restart, pod reschedule),
      # faz fast-forward. Caso contrário, ``gh repo clone`` usando o
      # GITHUB_TOKEN do Secret (deile-secrets). Falha hard se DEILE_PIPELINE_REPO
      # não está setado — sem repo, o pipeline não tem o que monitorar.
      initContainers:
        - name: bootstrap-repo
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/deile
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ -z "${DEILE_PIPELINE_REPO:-}" ]; then
                echo "FATAL: DEILE_PIPELINE_REPO env var não setada"
                exit 78
              fi
              if [ -f /home/deile/.git/HEAD ] || [ -f /home/deile/.git ]; then
                echo "repo já presente em /home/deile — fast-forward"
                cd /home/deile
                git fetch --depth=1 origin "$(git rev-parse --abbrev-ref HEAD)" || true
                git reset --hard "@{u}" || true
              else
                echo "clonando $DEILE_PIPELINE_REPO em /home/deile"
                # gh CLI usa GITHUB_TOKEN automaticamente (lido do Secret)
                GH_TOKEN_FILE=/run/secrets/deile/GITHUB_TOKEN
                if [ -f "$GH_TOKEN_FILE" ]; then
                  export GH_TOKEN="$(cat $GH_TOKEN_FILE)"
                fi
                # clone direto, evita gh dependency se não disponível
                if [ -n "${DEILE_FORGE_KIND:-github}" ] && [ "${DEILE_FORGE_KIND:-github}" = "gitlab" ]; then
                  GL_TOKEN_FILE=/run/secrets/deile/GITLAB_TOKEN
                  GL_TOKEN_VAL=""
                  [ -f "$GL_TOKEN_FILE" ] && GL_TOKEN_VAL=$(cat "$GL_TOKEN_FILE")
                  HOST="${DEILE_GITLAB_HOST:-gitlab.com}"
                  git clone --depth=1 "https://oauth2:${GL_TOKEN_VAL}@${HOST}/${DEILE_PIPELINE_REPO}.git" /home/deile
                else
                  HOST="${DEILE_GITHUB_HOST:-github.com}"
                  git clone --depth=1 "https://x-access-token:${GH_TOKEN}@${HOST}/${DEILE_PIPELINE_REPO}.git" /home/deile
                fi
              fi
              # Sanity: precisa ter deile.py (resolve_base_path checa esse marker)
              if [ ! -f /home/deile/deile.py ]; then
                echo "FATAL: /home/deile/deile.py ausente — repo errado?"
                exit 78
              fi
              echo "bootstrap-repo OK"
          env:
            - { name: DEILE_PIPELINE_REPO,  value: "elimarcavalli/deile" }
            # OAuth refresh real do claude-worker (issue #519): o retry reativo
            # do implementer.py roda neste pod e faz o POST grant_type=refresh_token.
            # Endpoint e client_id são constantes PÚBLICAS da aplicação Claude
            # Code (PKCE, sem client_secret) — não são credencial de operador.
            # Os tokens (access/refresh) vivem só no Secret/PVC, nunca aqui.
            - { name: CLAUDE_OAUTH_TOKEN_URL, value: "https://platform.claude.com/v1/oauth/token" }
            - { name: CLAUDE_OAUTH_CLIENT_ID, value: "9d1c250a-e61b-44d9-88ed-5944d1962f5e" }
            # Issue #355 — lê do mesmo ConfigMap que o main container para
            # que operadores GitLab configurem forge.kind=gitlab em um lugar
            # só. optional: true preserva o comportamento legado: se a chave
            # estiver ausente, a variável fica vazia e o script usa
            # ${DEILE_FORGE_KIND:-github} como fallback.
            - name: DEILE_FORGE_KIND
              valueFrom:
                configMapKeyRef:
                  name: deile-runtime-config
                  key: forge.kind
                  optional: true
          volumeMounts:
            - { name: deile-secrets, mountPath: /run/secrets/deile, readOnly: true }
            - { name: home,          mountPath: /home/deile }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

      containers:
        - name: pipeline
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/deile
          args: ["python3", "/app/wrapper.py", "pipeline"]
          env:
            - { name: HOME,                          value: /home/deile }
            - { name: PYTHONUNBUFFERED,              value: "1" }
            - { name: PYTHONDONTWRITEBYTECODE,       value: "1" }
            # Endpoints (não-deprecados) continuam via env — são leitura direta
            # (não-DEILE_* legacy) e a configuração layered ainda não cobre
            # ``DEILE_WORKER_ENDPOINT`` / ``DEILE_BOT_ENDPOINT``.
            - { name: DEILE_WORKER_ENDPOINT,         value: "http://deile-worker:8766" }
            - { name: DEILE_BOT_ENDPOINT,            value: "http://deilebot:8765" }
            # Aponta o settings layered pra fora do home (montado read-only
            # pelo ConfigMap deile-runtime-config / manifest 47). Substitui
            # ``DEILE_PIPELINE_*`` e ``DEILE_BOT_APPROVAL_AUTO`` depreciadas
            # pela issue #111. Mantemos o JSON em /etc/deile/ em vez de
            # ~/.deile/ porque montar subPath em ~/.deile/ tornaria o
            # diretório read-only pelo user 10001, quebrando ~/.deile/logs/,
            # ~/.deile/run/, ~/.deile/sessions/.
            - { name: DEILE_SETTINGS_FILE,           value: "/etc/deile/settings.json" }
            #
            # Para receber DMs do notifier, adicione "pipeline.notify_user_id":
            # "<discord-id>" em pipeline-settings.json (manifest 47).
            #
            # Client-side dispatch timeout MUST match the worker's task timeout
            # (45-deile-worker-deployment.yaml :: DEILE_WORKER_TASK_TIMEOUT_S),
            # otherwise the client times out before the worker finishes — observed
            # on PR #293 review: client 660s vs worker 900s = false WORKER_TIMEOUT
            # while the worker was still running.
            # 7230s = 7200 (worker DEILE_*_WORKER_TASK_TIMEOUT_S=2h) + 30s
            # margem pro server responder/serializar. Alinhado tanto com
            # deile-worker quanto com claude-worker. Antes era 1830s (30min)
            # — review da PR #344 morreu aos 30min com claude no meio do
            # trabalho (postou "Iniciando review..." mas não completou).
            - { name: DEILE_WORKER_TASK_TIMEOUT_S,   value: "7230" }
            # Issue #347 — pipeline_status_server (introspection HTTP) sobe
            # in-process no mesmo event loop do monitor (asyncio task em
            # runner.py::_start_status_server). Default port 8768; auth via
            # Bearer token montado em /run/secrets/pipeline-status/.
            - { name: DEILE_PIPELINE_STATUS_HOST,    value: "0.0.0.0" }
            - { name: DEILE_PIPELINE_STATUS_PORT,    value: "8768" }
            # Per-stage dispatcher routing (Decisão #43) — defaults definidos
            # após validação empírica da sessão 2026-05-29: classify é leve e
            # roda no deile-worker (deepseek barato); refine/implement/pr_review/
            # follow_ups precisam de Claude (opus pra refinar requisitos, sonnet
            # pra código). Sem esses defaults no manifest, `kubectl apply` zerava
            # configurações in-flight (kubectl set env) e o dispatch caía no
            # _DEFAULT_DISPATCHER=deile-worker para tudo, deixando os
            # claude-worker pods ociosos. Operador pode override via painel TUI
            # `[d]` (DispatchMatrixView) — o `kubectl set env` aplica patch
            # incremental, mantém estes como base.
            - { name: DEILE_PIPELINE_DISPATCH_MODE,        value: "deile-worker" }
            - { name: DEILE_PIPELINE_DISPATCH_CLASSIFY,    value: "claude-worker" }
            - { name: DEILE_PIPELINE_DISPATCH_REFINE,      value: "claude-worker" }
            - { name: DEILE_PIPELINE_DISPATCH_IMPLEMENT,   value: "claude-worker" }
            - { name: DEILE_PIPELINE_DISPATCH_PR_REVIEW,   value: "claude-worker" }
            - { name: DEILE_PIPELINE_DISPATCH_FOLLOW_UPS,  value: "claude-worker" }
            # Per-stage model overrides (Decisão #41). Mesma motivação acima:
            # sem isso no manifest, `kubectl apply` zerava as escolhas do
            # painel e o dispatch usava o modelo default global do worker
            # (que pode não ser o ideal para o stage).
            - { name: DEILE_PREFERRED_MODEL,               value: "deepseek:deepseek-v4-pro" }
            - { name: DEILE_PIPELINE_MODEL_CLASSIFY,       value: "anthropic:claude-sonnet-4-6" }
            - { name: DEILE_PIPELINE_MODEL_REFINE,         value: "anthropic:claude-opus-4-8" }
            - { name: DEILE_PIPELINE_MODEL_IMPLEMENT,      value: "anthropic:claude-sonnet-4-6" }
            - { name: DEILE_PIPELINE_MODEL_PR_REVIEW,      value: "anthropic:claude-opus-4-8" }
            - { name: DEILE_PIPELINE_MODEL_FOLLOW_UPS,     value: "anthropic:claude-sonnet-4-6" }
            # Per-stage reasoning effort (mesma motivação dos models): baked
            # default flipável live pelo painel [d] (coluna Reasoning). Vocabulário
            # Claude Code para anthropic/claude-worker (low|medium|high|xhigh|max|
            # ultracode|auto); específico por provider no deile-worker. "high" ≈
            # default da API anthropic (preserva comportamento); classify dialado
            # pra baixo por ser tarefa leve. Ver deile/core/models/reasoning.py.
            - { name: DEILE_REASONING_EFFORT,             value: "high" }
            - { name: DEILE_PIPELINE_REASONING_CLASSIFY,   value: "medium" }
            - { name: DEILE_PIPELINE_REASONING_REFINE,     value: "high" }
            - { name: DEILE_PIPELINE_REASONING_IMPLEMENT,  value: "ultracode" }
            - { name: DEILE_PIPELINE_REASONING_PR_REVIEW,  value: "medium" }
            - { name: DEILE_PIPELINE_REASONING_FOLLOW_UPS, value: "medium" }
            # Paralelismo: até 5 grupos simultâneos. claude-worker tem 3
            # réplicas, deile-worker 2 réplicas → ~5 dispatches reais
            # concorrentes antes da fila.
            - { name: DEILE_PIPELINE_MAX_PARALLEL,         value: "5" }
            # Timeouts per-stage (issue #530). Sem estas entradas, um
            # `kubectl apply` cru remove os overrides injetados via
            # `kubectl set env` e cada stage cai para o fallback global
            # (pipeline_claude_timeout=1800 ou BUILT_IN_TIMEOUT_S_DEILE=900),
            # causando kill prematuro em IMPLEMENT/PR_REVIEW/FOLLOW_UPS.
            # Valores canônicos desta issue; cluster inacessível no momento
            # da implementação (verificação registrada no PR).
            - { name: DEILE_PIPELINE_TIMEOUT_S_CLASSIFY,   value: "600"  }
            - { name: DEILE_PIPELINE_TIMEOUT_S_REFINE,     value: "1800" }
            # NOTA: o live chegou a divergir para IMPLEMENT=600 (drift de
            # painel/tuning sem registro de intenção); mantido 2700 de
            # propósito — 600 mataria implements reais (built-in claude=1800)
            # e contradiz o racional de kill-prematuro acima.
            - { name: DEILE_PIPELINE_TIMEOUT_S_IMPLEMENT,  value: "2700" }
            - { name: DEILE_PIPELINE_TIMEOUT_S_PR_REVIEW,  value: "3600" }
            - { name: DEILE_PIPELINE_TIMEOUT_S_FOLLOW_UPS, value: "2700" }
            # Cost cap per-stage (issue #392): teto de custo estimado antes do
            # POST; StageCostCapExceeded aborta o dispatch acima do cap.
            - { name: DEILE_PIPELINE_COST_CAP_USD_CLASSIFY,   value: "1.00" }
            - { name: DEILE_PIPELINE_COST_CAP_USD_REFINE,     value: "5.00" }
            - { name: DEILE_PIPELINE_COST_CAP_USD_IMPLEMENT,  value: "5.00" }
            - { name: DEILE_PIPELINE_COST_CAP_USD_PR_REVIEW,  value: "5.00" }
            - { name: DEILE_PIPELINE_COST_CAP_USD_FOLLOW_UPS, value: "5.00" }
            # Retries per-stage (issue #391): tentativas antes de marcar a
            # etapa como falha; espelha o que o painel injeta via set env.
            - { name: DEILE_PIPELINE_RETRIES_CLASSIFY,   value: "2" }
            - { name: DEILE_PIPELINE_RETRIES_REFINE,     value: "1" }
            - { name: DEILE_PIPELINE_RETRIES_IMPLEMENT,  value: "4" }
            - { name: DEILE_PIPELINE_RETRIES_PR_REVIEW,  value: "3" }
            - { name: DEILE_PIPELINE_RETRIES_FOLLOW_UPS, value: "5" }
            # Redireciona kubectl para o apiserver na porta nativa do k3s
            # ClusterIP do kubernetes service (10.43.0.1:443). enableServiceLinks
            # false bloqueia a injeção automática, então re-injetamos aqui.
            # ANTES usava o node IP via Downward API (status.hostIP:6443) porque
            # o kube-proxy DNAT do ClusterIP não funcionava de dentro de pods em
            # versões antigas do Rancher Desktop/Lima. Isso quebrou quando o IP
            # da VM Lima drifou: o InternalIP do node (status.hostIP) divergiu do
            # IP onde o API escuta (ExternalIP), deixando kubectl-de-pod com
            # "connection refused" em 192.168.5.15:6443. O ClusterIP é estável
            # (kube-proxy roteia para o endpoint corrente) e à prova de drift —
            # verificado funcionando de dentro do pod no Rancher Desktop atual.
            - { name: KUBERNETES_SERVICE_HOST, value: "10.43.0.1" }
            - { name: KUBERNETES_SERVICE_PORT, value: "443" }
          ports:
            - { name: status-api, containerPort: 8768, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/health, port: status-api }
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 4
          volumeMounts:
            # GITHUB_TOKEN (gh) + DEILE_BOT_AUTH_TOKEN (notifier) + LLM keys
            # (unused here, harmless) — same Secret as worker/shell.
            - { name: deile-secrets,  mountPath: /run/secrets/deile,  readOnly: true }
            # Worker bearer — needed to authenticate dispatches to the worker.
            - { name: worker-bearer,  mountPath: /run/secrets/worker, readOnly: true }
            # Issue #347 — pipeline_status_server Bearer (separado do worker
            # bearer pra escopo distinto). Best-effort: se Secret ausente, o
            # status server tenta DEILE_PIPELINE_STATUS_AUTH_TOKEN env e
            # falha-no-startup com mensagem clara (server desabilitado;
            # pipeline continua).
            - { name: status-bearer,  mountPath: /run/secrets/pipeline-status, readOnly: true }
            - { name: home,           mountPath: /home/deile }
            - { name: tmp,            mountPath: /tmp }
            # Issue #350 — PVC para o DispatchLedger sobreviver a rollouts.
            # Montado em subpath de /home/deile: o emptyDir "home" cobre a
            # raiz (repo clone) e o PVC overlay cobre .deile/pipeline/ (ledger).
            - { name: pipeline-ledger, mountPath: /home/deile/.deile/pipeline }
            # PVC de logs rotacionados (issue #404 / log_mgmt/log_rotator.py).
            - { name: logs,           mountPath: /home/deile/logs }
            # settings.json layered (issue #111). Apontado pelo env var
            # DEILE_SETTINGS_FILE para evitar collision com ~/.deile/ writable.
            - name: runtime-config
              mountPath: /etc/deile/settings.json
              subPath: pipeline-settings.json
              readOnly: true
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - { name: deile-secrets, secret: { secretName: deile-secrets,  defaultMode: 288 } }
        - { name: worker-bearer, secret: { secretName: worker-bearer,  defaultMode: 288 } }
        # Issue #347 — Secret separado pro pipeline_status_server (criado por
        # deploy.py k8s up / por hand via kubectl create secret). Se ausente,
        # initContainer pode opcionalmente gerar um random — V1: server falha
        # gracefully na boot se Secret vazio (server desabilitado, pipeline
        # segue normal).
        - { name: status-bearer, secret: { secretName: pipeline-status-bearer, defaultMode: 288, optional: true } }
        - { name: home,          emptyDir: { sizeLimit: "256Mi" } }
        - { name: tmp,           emptyDir: { sizeLimit: "256Mi" } }
        # Issue #350 — PVC de 1Gi pra persistir o DispatchLedger entre
        # restarts/rollouts. O path ~/.deile/pipeline/dispatches.json
        # resolve naturalmente pra este mount sem alterar dispatch_ledger.py.
        - { name: pipeline-ledger, persistentVolumeClaim: { claimName: deile-pipeline-ledger } }
        # PVC de logs rotacionados (issue #404).
        - { name: logs,            persistentVolumeClaim: { claimName: deile-logs-pipeline } }
        - name: runtime-config
          configMap:
            name: deile-runtime-config
            defaultMode: 292   # 0o444 — read-only inside pod
---
# Issue #347 — Service ClusterIP pra o pipeline_status_server (porta 8768).
# Painel TUI consome via DNS interno OU via port-forward em dev.
apiVersion: v1
kind: Service
metadata:
  name: deile-pipeline-status
  labels:
    app: deile-pipeline
spec:
  type: ClusterIP
  selector:
    app: deile-pipeline
  ports:
    - { name: status-api, port: 8768, targetPort: status-api, protocol: TCP }
