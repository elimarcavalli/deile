# Long-running deile pod for interactive operator sessions:
#
#   kubectl -n deile exec -it deploy/deile-shell -- python3 /app/wrapper.py deile "your prompt"
#   kubectl -n deile exec -it deploy/deile-shell -- python3 /app/wrapper.py deile          # interactive REPL
#
# Tool policy = "all" — bash, file_read/write, execute_python, search,
# git, etc. are all enabled. That is intentional: the prompt comes
# from the operator (you, via kubectl), not from any external user,
# so prompt-injection is not a concern. The container's read-only
# rootfs + dropped capabilities + NetworkPolicy still confine what a
# wandering tool can do (Mac unreachable, only outbound 443 + bot
# service allowed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deile-shell
  labels:
    app: deile-shell
    role: deile
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: deile-shell
      role: deile
  template:
    metadata:
      labels:
        app: deile-shell
        role: deile
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: deile
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/deile
          # Sleep forever so kubectl exec always has a target. We
          # never start deile here automatically — the operator runs
          # it on demand via exec.
          command: ["/usr/bin/tini", "--", "sleep", "infinity"]
          env:
            - { name: HOME, value: /home/deile }
            - { name: PYTHONUNBUFFERED, value: "1" }
            - { name: DEILE_BOT_ENDPOINT, value: "http://deilebot:8765" }
            - { name: DEILE_DEFAULT_PERSONA, value: developer }
            # Full toolset — see header for rationale.
            - { name: DEILE_WRAPPER_TOOL_WHITELIST, value: "all" }
            # approval.auto=true vem de /etc/deile/settings.json via ConfigMap
            # deile-runtime-config (manifest 47) — substitui
            # DEILE_BOT_APPROVAL_AUTO depreciada (issue #111).
            - { name: DEILE_SETTINGS_FILE, value: "/etc/deile/settings.json" }
          volumeMounts:
            - { name: deile-secrets, mountPath: /run/secrets/deile, readOnly: true }
            - { name: home, mountPath: /home/deile }
            - { name: tmp,  mountPath: /tmp }
            # bot-config provides the clonable_repos allowlist to the wrapper.
            # subPath pins one file so /home/deile/config stays otherwise empty.
            - name: bot-config
              mountPath: /home/deile/config/deilebot.yaml
              subPath: deilebot.yaml
              readOnly: true
            # settings.json layered (issue #111) — ver DEILE_SETTINGS_FILE env.
            - name: runtime-config
              mountPath: /etc/deile/settings.json
              subPath: shell-settings.json
              readOnly: true
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2000m", memory: "2Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - { name: deile-secrets, secret: { secretName: deile-secrets, defaultMode: 288 } }
        - name: bot-config
          configMap:
            name: bot-config
            defaultMode: 292  # 0o444 — read-only inside pod
        - name: runtime-config
          configMap:
            name: deile-runtime-config
            defaultMode: 292  # 0o444 — read-only inside pod
        # ── Persistent home (optional) ───────────────────────────────────────
        # By default /home/deile is an ephemeral emptyDir. To persist cloned
        # repos and the working directory across pod restarts:
        #   1. Apply 36-deile-shell-pvc.yaml to create the PVC.
        #   2. Comment out the emptyDir entry below.
        #   3. Uncomment the persistentVolumeClaim entry.
        #   4. kubectl rollout restart deployment/deile-shell
        # WARNING: emptyDir sizeLimit is a soft quota enforced by kubelet eviction.
        # Exceeding the limit causes silent pod eviction. 1Gi accommodates
        # typical shallow-cloned repos; use a PVC for larger workloads.
        - { name: home, emptyDir: { sizeLimit: "1Gi" } }
        # - name: home
        #   persistentVolumeClaim:
        #     claimName: deile-shell-home
        - { name: tmp,  emptyDir: { sizeLimit: "1Gi" } }
