# Bearer token Secret pro monitor_command_server (spec 2026-06-04).
#
# monitor_command_server.py expõe :8769 com endpoints de controle
# (monitor-status, command, ask). Bearer evita que qualquer pod do namespace
# consulte (defense-in-depth — embora NetworkPolicy do manifest 40 já
# restrinja ingress ao deilebot).
#
# A chave do Secret DEVE ser ``MONITOR_BEARER_TOKEN`` — é esse o nome lido
# por monitor_command_server._read_auth_token() e montado em
# /run/secrets/monitor/MONITOR_BEARER_TOKEN.
#
# Conteúdo é populado pelo deploy.py k8s up (gera random token via
# `python3 -c 'import secrets; print(secrets.token_urlsafe(32))'`)
# OU pelo operador via:
#
#   TOKEN=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')
#   kubectl -n deile create secret generic monitor-bearer \
#     --from-literal=MONITOR_BEARER_TOKEN=$TOKEN \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Volume mount no manifest 55 é `optional: true` — se Secret vazio/ausente,
# server NÃO sobe (best-effort) e o loop de tick continua funcional sem
# o control plane HTTP.
apiVersion: v1
kind: Secret
metadata:
  name: monitor-bearer
  namespace: deile
  labels:
    app: deile-monitor
    role: deile
type: Opaque
stringData:
  MONITOR_BEARER_TOKEN: ""
