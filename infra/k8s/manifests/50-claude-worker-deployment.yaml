# claude-worker — pod paralelo ao deile-worker que executa `claude -p` em
# worktrees isolados sob o PVC claude-worker-home.
#
# Issue #309 fase 2.
# Spec: docs/superpowers/specs/2026-05-26-claude-worker-design.md
#
# Threat model: ver seção 7 da spec. Credentials no PVC mode 0600;
# NetworkPolicy egress whitelisted via manifest 40 + ConfigMap 47.
#
# Secret claude-worker-bearer: criado programaticamente por
# _kubectl_sync_bearer_token() (deploy.py k8s claude-login) ANTES
# desta manifest ser aplicada — elimina race condition do issue #356.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-worker
  namespace: deile
  labels:
    app: claude-worker
    role: deile
spec:
  # Default 3 réplicas para acompanhar o paralelismo do pipeline
  # (DEILE_PIPELINE_MAX_PARALLEL=5, com deile-worker em 2 = ~5 concorrentes
  # totais). Operador escala via painel TUI / `deploy.py k8s scale`; este é
  # o ponto de partida quando o cluster sobe limpo.
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: claude-worker
      role: deile
  template:
    metadata:
      labels:
        app: claude-worker
        role: deile
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        # OnRootMismatch evita o "chown recursivo" toda vez que o pod sobe
        # (que tornaria a inicialização lenta em PVC grande). K8s só faz
        # chown se uid/gid do root do volume divergir do fsGroup.
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile: { type: RuntimeDefault }

      # InitContainer idempotente — preserva token refrescado in-pod entre
      # restarts. Antes (pré-PR OAuth auto-renew) esta etapa SEMPRE copiava
      # o credentials.json do Secret pro PVC, sobrescrevendo qualquer token
      # mais recente que o ``claude -p`` havia obtido via refresh in-pod
      # (a cada restart o pod voltava com o token velho — eventualmente
      # expirado se ``claude-login`` não tivesse rodado nas últimas 8h).
      #
      # Comportamento novo: compara ``expiresAt`` do Secret vs PVC. Copia
      # apenas quando (a) PVC não tem credentials ainda OU (b) o Secret tem
      # um token MAIS RECENTE (operador acabou de rodar ``claude-login``).
      # Em todos os outros casos preserva o token do PVC, que é tipicamente
      # o resultado do refresh in-pod feito pelo próprio claude CLI.
      #
      # Mecanismo de força: ``claude-login --switch`` (troca de conta) precisa
      # vencer essa proteção — ele deleta o credentials.json do PVC ANTES do
      # rollout (via Job dedicado em ``_claude_install._force_clear_pvc_creds``).
      # Após o delete, o init detecta arquivo ausente e copia normalmente.
      #
      # Roda como uid 10001 (PSS restricted-compliant); fsGroup garante perms.
      initContainers:
        - name: bootstrap-creds
          image: deile-stack:local
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /home/claude/.claude
              CREDS_PVC=/home/claude/.claude/credentials.json
              CREDS_SECRET=/run/secrets/claude/credentials.json
              PY_READ_EXP='import json,sys;d=json.load(open(sys.argv[1]));o=d.get("claudeAiOauth") or {};print(int(o.get("expiresAt") or d.get("expiresAt") or 0))'
              if [ ! -f "$CREDS_PVC" ]; then
                echo "bootstrap-creds: PVC sem credentials.json - copiando do Secret"
                cp "$CREDS_SECRET" "$CREDS_PVC"
                chmod 0600 "$CREDS_PVC"
              else
                PVC_EXP=$(python3 -c "$PY_READ_EXP" "$CREDS_PVC" 2>/dev/null || echo 0)
                SECRET_EXP=$(python3 -c "$PY_READ_EXP" "$CREDS_SECRET" 2>/dev/null || echo 0)
                if [ "${SECRET_EXP:-0}" -gt "${PVC_EXP:-0}" ]; then
                  echo "bootstrap-creds: Secret mais recente (Secret=$SECRET_EXP > PVC=$PVC_EXP) - copiando"
                  cp "$CREDS_SECRET" "$CREDS_PVC"
                  chmod 0600 "$CREDS_PVC"
                else
                  echo "bootstrap-creds: PVC preservado (PVC=$PVC_EXP >= Secret=$SECRET_EXP)"
                fi
              fi
              ls -la "$CREDS_PVC"
          volumeMounts:
            - name: claude-credentials
              mountPath: /run/secrets/claude
              readOnly: true
            - name: claude-home
              mountPath: /home/claude
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile: { type: RuntimeDefault }

      containers:
        - name: claude-worker
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/claude
          args: ["python3", "/app/wrapper.py", "claude-worker"]
          env:
            - { name: HOME, value: /home/claude }
            - { name: PYTHONUNBUFFERED, value: "1" }
            - { name: PYTHONDONTWRITEBYTECODE, value: "1" }
            - { name: DEILE_CLAUDE_WORKER_HOST, value: "0.0.0.0" }
            - { name: DEILE_CLAUDE_WORKER_PORT, value: "8767" }
            - { name: DEILE_CLAUDE_WORKER_ROOT, value: "/home/claude/work" }
            # 7200s = 2h. PRs grandes (10k+ linhas + suite full ~5min)
            # passam de 30min facilmente. Antes era 1800s — review do #344
            # foi morta aos 30min com claude no meio do trabalho (postou
            # "Iniciando review..." mas não completou).
            - { name: DEILE_CLAUDE_WORKER_TASK_TIMEOUT_S, value: "7200" }
            - { name: DEILE_CLAUDE_WORKER_LOG_LEVEL, value: "INFO" }
            - { name: DEILE_CLAUDE_ALLOWED_REPOS_FILE,
                value: "/etc/claude-worker/allowed_repos.regex" }
            # Lease TTL e heartbeat — controlam o mecanismo de exclusão mútua
            # entre réplicas paralelas do claude-worker (issue #309 multi-claude).
            # TTL: janela de detecção de pod morto; heartbeat: frequência de
            # atualização do lease. Ajustar conforme carga da workload.
            - { name: DEILE_CLAUDE_LEASE_TTL_S, value: "30" }
            - { name: DEILE_CLAUDE_LEASE_HEARTBEAT_S, value: "5" }
            # Retenção dos transcripts JSONL órfãos, em DIAS (issue #445). O
            # startup hook + a task periódica de cleanup só colhem+podam um
            # transcript órfão (workdir-pai removido) após N dias SEM
            # modificação. JSONL é minúsculo (~KB) — retenção longa preserva o
            # histórico resumível + o detalhe completo na tela de tokens.
            # Knob SEPARADO do workdir (CLEANUP_RETENTION_DAYS, mais curto).
            # Editável pelo painel [d] (kubectl set env + rollout, sem rebuild).
            - { name: DEILE_CLAUDE_JSONL_RETENTION_DAYS, value: "30" }
            # OAuth refresh real (issue #519). Endpoint e client_id são
            # constantes PÚBLICAS da aplicação Claude Code (fluxo PKCE, sem
            # client_secret) — idênticas em toda instalação; NÃO são credencial
            # de operador. Os tokens (access/refresh) vivem só no Secret
            # claude-credentials / PVC, nunca aqui. Sem estas, o auto-renew cai
            # no fallback humano (a frota expira a cada ~8h).
            - { name: CLAUDE_OAUTH_TOKEN_URL, value: "https://platform.claude.com/v1/oauth/token" }
            - { name: CLAUDE_OAUTH_CLIENT_ID, value: "9d1c250a-e61b-44d9-88ed-5944d1962f5e" }
          ports:
            - { name: claude-api, containerPort: 8767, protocol: TCP }
          volumeMounts:
            - { name: claude-worker-bearer, mountPath: /run/secrets/claude-worker, readOnly: true }
            # GITHUB_TOKEN + GITLAB_TOKEN para que o ``claude -p`` consiga
            # clonar/comitar/postar review nas forges. SEM isso o claude
            # diagnostica BLOCKED_no_github_credentials (fase 2 smoke
            # da PR #336) — repos privados ficam invisíveis ao agente.
            - { name: deile-secrets, mountPath: /run/secrets/deile, readOnly: true }
            - { name: claude-home, mountPath: /home/claude }
            - { name: tmp, mountPath: /tmp }
            - name: allowed-repos
              mountPath: /etc/claude-worker
              readOnly: true
          readinessProbe:
            httpGet: { path: /v1/health, port: claude-api }
            initialDelaySeconds: 5
            periodSeconds: 20
            failureThreshold: 4
          livenessProbe:
            httpGet: { path: /v1/health, port: claude-api }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests: { cpu: "100m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "6Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

      volumes:
        - name: claude-credentials
          secret:
            secretName: claude-credentials
            defaultMode: 0o400
        - name: claude-worker-bearer
          secret:
            secretName: claude-worker-bearer
            defaultMode: 0o400
        - name: deile-secrets
          secret:
            secretName: deile-secrets
            defaultMode: 0o400
        - name: claude-home
          persistentVolumeClaim:
            claimName: claude-worker-home
        - name: tmp
          emptyDir: { sizeLimit: "5Gi" }
        - name: allowed-repos
          configMap:
            name: claude-worker-allowed-repos
            defaultMode: 0o444
---
apiVersion: v1
kind: Service
metadata:
  name: claude-worker
  namespace: deile
  labels:
    app: claude-worker
spec:
  type: ClusterIP
  selector:
    app: claude-worker
  ports:
    - { name: claude-api, port: 8767, targetPort: claude-api, protocol: TCP }
