# Cria o namespace DEILE com o Pod Security Standards "restricted".
# Para usar um nome de namespace customizado (ex.: deile-gl, deile-staging):
#
#   kubectl create namespace deile-gl \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl label namespace deile-gl \
#     pod-security.kubernetes.io/enforce=restricted \
#     pod-security.kubernetes.io/enforce-version=v1.29 \
#     pod-security.kubernetes.io/audit=restricted \
#     pod-security.kubernetes.io/audit-version=v1.29 \
#     pod-security.kubernetes.io/warn=restricted \
#     pod-security.kubernetes.io/warn-version=v1.29 \
#     app.kubernetes.io/managed-by=deile
#
# Em seguida aplique os demais manifests com:
#   kubectl apply -n <seu-namespace> -f infra/k8s/manifests/
#
# OU use o orquestrador:
#   python3 infra/k8s/deploy.py k8s up --namespace deile-gl
#
# O manifest abaixo é o exemplo padrão (namespace = deile).
# Não é necessário editá-lo — o "namespace:" foi removido dos outros
# manifests; o kubectl aplica o NS via flag -n.
apiVersion: v1
kind: Namespace
metadata:
  name: deile
  labels:
    name: deile
    # Pod Security Standards — restricted profile is enforced for every
    # pod created in this namespace. Refusal to comply blocks creation
    # at admission time. See:
    # https://kubernetes.io/docs/concepts/security/pod-security-standards/
    pod-security.kubernetes.io/enforce: restricted
    # Pin to a specific PSS version so cluster upgrades don't silently
    # tighten the profile and break running pods. Bump deliberately when
    # you upgrade the cluster minor version and review the new profile.
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.29
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.29
