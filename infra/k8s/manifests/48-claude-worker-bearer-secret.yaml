# Bearer token Secret para claude-worker (idem worker-bearer do deile-worker).
#
# DOCUMENTAÇÃO — este arquivo NÃO é mais aplicado por _kubectl_apply_manifests()
# (issue #356, Opção A). O Secret é criado/atualizado programaticamente por
# _kubectl_sync_bearer_token() via `kubectl create secret generic --dry-run=client
# -o yaml | kubectl apply -f -`, ANTES que o Deployment 50 seja aplicado.
# Isso elimina a race condition em que o pod subiria com Secret vazio.
#
# Para recriar o Secret manualmente (sem passar pelo bootstrap):
#   kubectl create secret generic claude-worker-bearer \
#     --from-literal=CLAUDE_WORKER_BEARER_TOKEN=<token> \
#     -n deile --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: claude-worker-bearer
  namespace: deile
  labels:
    app: claude-worker
    role: deile
type: Opaque
stringData:
  # Populated by `python3 infra/k8s/deploy.py k8s claude-login`.
  CLAUDE_WORKER_BEARER_TOKEN: ""
