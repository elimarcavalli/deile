# deile-monitor — 24/7 cluster supervisor pod.
#
# Runs DEILE with the ``monitor`` persona (deile/personas/instructions/monitor.md).
# Behavior is entirely prompt-driven: watchguards, thresholds, actions, and
# notification channels are adjusted by editing monitor.md — no rebuild or
# redeployment needed (hot-reload via watchdog).
#
# What it does:
#   - Polls cluster state every 2 minutes (kubectl / gh via bash tool).
#   - Detects orphaned issues, expired OAuth, failed jobs, pipeline anomalies.
#   - Heals autonomously where safe (delete stale error pods, renew OAuth).
#   - Notifies the human operator via deilebot when a decision is needed.
#   - Responds to ad-hoc questions proxied by the bot.
#
# Security posture (mirrors deile-worker):
#   - readOnlyRootFilesystem; writable: /state (PVC) and /tmp (emptyDir).
#   - drop ALL caps; uid 10001; PSS restricted.
#   - role=deile: inherits egress to bot:8765 and external 443 (LLM + gh).
#   - ServiceAccount ``cluster-reader`` for kubectl read + pods/exec (OAuth renew).
#   - NetworkPolicy: egress to kube-apiserver (kubectl), bot:8765 (notify),
#     443 (LLM + gh); no inbound.
#
# Note on naming: ``deile/orchestration/pipeline/monitor.py`` is the *pipeline's*
# internal tick monitor. This pod is a separate, independent cluster supervisor.
# They are distinct; this pod's persona lives in personas/instructions/monitor.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deile-monitor
  labels:
    app: deile-monitor
    role: deile   # inherits deile-egress-to-bot (8765) + deile-egress-https-llm (443)
spec:
  replicas: 1
  strategy: { type: Recreate }  # single supervisor: never run two at once
  selector:
    matchLabels:
      app: deile-monitor
      role: deile
  template:
    metadata:
      labels:
        app: deile-monitor
        role: deile
    spec:
      # cluster-reader SA grants: get/list/watch for pods, jobs, cronjobs, events
      # + pods/exec for OAuth renewal via kubectl exec into claude-worker.
      # Defined in this same manifest below.
      serviceAccountName: deile-monitor-sa
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      # Bootstrap the DEILE repo so the monitor has access to persona files
      # (monitor.md lives in deile/personas/instructions/ which is on the PVC).
      initContainers:
        - name: bootstrap-repo
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/deile
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Issue #612 (project-agnostic): DEILE_PIPELINE_REPO vem da FONTE
              # ÚNICA `pipeline.repo` (ConfigMap deile-runtime-config / manifest
              # 47) via configMapKeyRef abaixo — sem repo configurado o clone
              # falha alto em vez de cair num default hardcoded.
              REPO="${DEILE_PIPELINE_REPO:?DEILE_PIPELINE_REPO ausente — configure pipeline.repo no ConfigMap deile-runtime-config}"
              if [ -f /home/deile/.git/HEAD ]; then
                echo "repo already present — fast-forward"
                git fetch --depth=1 origin "$(git rev-parse --abbrev-ref HEAD)" || true
                git reset --hard "@{u}" || true
              else
                echo "cloning $REPO"
                GH_TOKEN_FILE=/run/secrets/deile/GITHUB_TOKEN
                [ -f "$GH_TOKEN_FILE" ] && export GH_TOKEN="$(cat $GH_TOKEN_FILE)"
                HOST="${DEILE_GITHUB_HOST:-github.com}"
                git clone --depth=1 "https://x-access-token:${GH_TOKEN}@${HOST}/${REPO}.git" /home/deile
              fi
              echo "bootstrap-repo OK"
          env:
            # Issue #612 — repo-alvo do clone vem da FONTE ÚNICA `pipeline.repo`
            # (ConfigMap deile-runtime-config / manifest 47), não de um literal.
            - name: DEILE_PIPELINE_REPO
              valueFrom:
                configMapKeyRef:
                  name: deile-runtime-config
                  key: pipeline.repo
          volumeMounts:
            - { name: deile-secrets, mountPath: /run/secrets/deile, readOnly: true }
            - { name: home,          mountPath: /home/deile }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

        - name: init-state-dir
          image: deile-stack:local
          imagePullPolicy: Never
          command: ["/bin/sh", "-c", "mkdir -p /state/monitor-commands && echo 'state dir ready'"]
          volumeMounts:
            - { name: state, mountPath: /state }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

      containers:
        - name: monitor
          image: deile-stack:local
          imagePullPolicy: Never
          workingDir: /home/deile
          # Main process: monitor_command_server.py is now the supervisor
          # (Abordagem 1, spec 2026-06-04). It replaces the old bash heartbeat
          # loop while keeping the deterministic Phase-A tick byte-identical:
          #   - It schedules `python3 /app/monitor_tick.py` as a fresh subprocess
          #     every DEILE_MONITOR_TICK_INTERVAL_S (Phase A — zero LLM, crash
          #     isolated).
          #   - When Phase A writes /state/monitor-judgment.json it spawns
          #     `python3 /app/wrapper.py monitor "<fixed instruction>"` (Phase B).
          #     The judgment content is NEVER passed as argv (prompt-injection
          #     defence preserved — the persona reads the file itself as data).
          #   - Concurrently it serves an aiohttp control plane on :8769 so the
          #     deilebot can ask/status/command the monitor. The HTTP server is
          #     best-effort: a bind failure logs a warning and the tick loop
          #     keeps running (the supervisor's core job never stops).
          # Mirrors deile/orchestration/pipeline/runner.py (loop + status server
          # co-hosted on one event loop). Tick interval + iteration cap remain
          # overridable at runtime via env without rebuilding the image.
          # `args` (NOT `command`) so the image ENTRYPOINT (tini) stays PID 1 and
          # reaps the kubectl/gh grandchildren the tick spawns — same pattern as
          # deile-worker/deile-pipeline. Overriding with `command:` would drop
          # tini → zombies accumulate until fork() fails → the tick would stop.
          args: ["python3", "/app/monitor_command_server.py"]
          env:
            - { name: HOME,                    value: /home/deile }
            - { name: PYTHONUNBUFFERED,        value: "1" }
            - { name: PYTHONDONTWRITEBYTECODE, value: "1" }
            - { name: DEILE_DEFAULT_PERSONA,   value: monitor }
            - { name: DEILE_BOT_ENDPOINT,      value: "http://deilebot:8765" }
            - { name: DEILE_SETTINGS_FILE,     value: "/etc/deile/settings.json" }
            # Repo the monitor inspects (gh CLI calls). Issue #612: FONTE ÚNICA
            # `pipeline.repo` (ConfigMap deile-runtime-config / manifest 47),
            # lida por monitor_tick.py (os.environ DEILE_PIPELINE_REPO) → run_tick.
            - name: DEILE_PIPELINE_REPO
              valueFrom:
                configMapKeyRef:
                  name: deile-runtime-config
                  key: pipeline.repo
            # State directory (PVC mount — writable for tick state files)
            - { name: DEILE_MONITOR_STATE_DIR, value: "/state" }
            # Namespace the monitor supervises (Phase A renew + kubectl scope).
            - { name: DEILE_K8S_NAMESPACE,     value: "deile" }
            # Seconds between ticks (shell loop sleep). Default 1800 = 30 min —
            # a supervisor does not need a tighter cadence; longer = fewer ticks.
            - { name: DEILE_MONITOR_TICK_INTERVAL_S, value: "1800" }
            # Cap the Phase-B (LLM) tool loop — defence in depth against runaway
            # token spend even when the persona is invoked for V8 judgment.
            - { name: DEILE_MAX_TOOL_ITERATIONS, value: "50" }
            # HTTP control plane (spec 2026-06-04 §3.2). The server binds here;
            # bearer auth comes from /run/secrets/monitor/MONITOR_BEARER_TOKEN.
            - { name: DEILE_MONITOR_PORT,        value: "8769" }
            - { name: DEILE_MONITOR_STATUS_HOST, value: "0.0.0.0" }
            # A Q&A turn spawns a FULL DEILE agent subprocess; cap to 1 concurrent
            # so a burst can't OOM the pod alongside the tick + Phase-B subprocesses.
            - { name: DEILE_MONITOR_QA_MAX_CONCURRENT, value: "1" }
          ports:
            - { name: monitor-api, containerPort: 8769, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/health, port: monitor-api }
            initialDelaySeconds: 5
            periodSeconds: 20
            failureThreshold: 4
          # /v1/health returns 503 when the deterministic tick goes STALE (the
          # supervisor wedged) — so a hung tick loop behind a still-serving HTTP
          # server gets restarted instead of sitting silently. Generous thresholds
          # tolerate a slow startup / a single late tick.
          livenessProbe:
            httpGet: { path: /v1/health, port: monitor-api }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - { name: deile-secrets, mountPath: /run/secrets/deile, readOnly: true }
            # Bearer token for the :8769 control plane (spec 2026-06-04 §3.6).
            # monitor_command_server.py reads MONITOR_BEARER_TOKEN from here.
            - { name: monitor-bearer, mountPath: /run/secrets/monitor, readOnly: true }
            - { name: home,          mountPath: /home/deile }
            - { name: tmp,           mountPath: /tmp }
            # PVC for persistent monitor state (audit log, tick state, pause flag)
            - { name: state,         mountPath: /state }
            # Runtime settings (same ConfigMap as pipeline/worker)
            - name: runtime-config
              mountPath: /etc/deile/settings.json
              subPath: pipeline-settings.json
              readOnly: true
          resources:
            requests: { cpu: "50m",  memory: "192Mi" }
            # 1.5Gi: a Q&A turn runs a FULL DEILE agent subprocess (deile-worker
            # gets 2Gi for one). With QA concurrency capped at 1 (env above) the
            # peak is tick + Phase-B + 1 Q&A; 768Mi risked OOM under /monitor ask.
            limits:   { cpu: "1000m", memory: "1536Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }

      volumes:
        - { name: deile-secrets, secret: { secretName: deile-secrets, defaultMode: 288 } }
        # Bearer Secret for the :8769 control plane (manifest 57). optional:
        # true mirrors pipeline-status-bearer (manifest 46): if absent/empty,
        # the server logs a warning and the tick loop keeps running.
        - { name: monitor-bearer, secret: { secretName: monitor-bearer, defaultMode: 288, optional: true } }
        - { name: home,          emptyDir: { sizeLimit: "256Mi" } }
        - { name: tmp,           emptyDir: { sizeLimit: "128Mi" } }
        # PVC for monitor state — survives restarts and rollouts.
        # Create via: kubectl -n deile apply -f 56-deile-monitor-pvc.yaml
        - { name: state,         persistentVolumeClaim: { claimName: deile-monitor-state } }
        - name: runtime-config
          configMap:
            name: deile-runtime-config
            defaultMode: 292  # 0o444
---
# ServiceAccount for the monitor pod.
# Minimal RBAC: read cluster state + pods/exec for OAuth renewal.
# automountServiceAccountToken is set to true here to match the podTemplate
# (which also sets true). The monitor needs the token mounted so the in-pod
# kubectl calls (autonomous OAuth renewal, pod cleanup) succeed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deile-monitor-sa
  labels:
    app: deile-monitor
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deile-monitor-role
  labels:
    app: deile-monitor
rules:
  # Read cluster state for watchguards
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  # pods/exec: required for autonomous OAuth renewal via kubectl exec
  # into claude-worker (same verb as claude-creds-renewer SA in manifest 51)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Delete stale error pods (BackoffLimitExceeded cleanup)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Secret access to the claude-credentials Secret. Issue #603 removed the
  # headless OAuth renewal (auth is now the ~1-year setup-token); the grant is
  # kept for parity with the claude-creds-renewer SA in manifest 51 and any
  # setup-token Secret updates routed through this SA.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "create"]
    resourceNames: ["claude-credentials"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deile-monitor-rolebinding
  labels:
    app: deile-monitor
subjects:
  - kind: ServiceAccount
    name: deile-monitor-sa
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: deile-monitor-role
---
# Service ClusterIP pro monitor_command_server (porta 8769, spec 2026-06-04
# §3.6). O deilebot consome via DNS interno (deile-monitor:8769) para Q&A,
# status determinístico e ordens. Ingress restrito ao deilebot pela
# NetworkPolicy (manifest 40).
apiVersion: v1
kind: Service
metadata:
  name: deile-monitor
  labels:
    app: deile-monitor
spec:
  type: ClusterIP
  selector:
    app: deile-monitor
  ports:
    - { name: monitor-api, port: 8769, targetPort: monitor-api, protocol: TCP }
