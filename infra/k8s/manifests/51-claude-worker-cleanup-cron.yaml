# CronJob diário de garbage collection do PVC claude-worker-home (issue #408).
#
# Varre workdirs/leases stale sem afetar pods em execução:
#   - leases com TTL expirado + PID morto → remove lease
#   - workdirs mais velhos que DEILE_CLAUDE_CLEANUP_RETENTION_DAYS → remove dir
#   - workdirs sem session JSONL → remove dir
#
# Executa 1x/dia às 03:00 UTC. Não requer o servidor HTTP do claude-worker
# estar up — acessa o PVC diretamente.
#
# Para ajustar retenção: kubectl -n deile set env cronjob/claude-worker-cleanup
#   DEILE_CLAUDE_CLEANUP_RETENTION_DAYS=14
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-worker-cleanup
  namespace: deile
  labels:
    app: claude-worker
    role: deile
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: claude-worker
            role: deile
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            fsGroupChangePolicy: "OnRootMismatch"
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: cleanup
              image: deile-stack:local
              imagePullPolicy: Never
              workingDir: /home/claude
              command: ["python3", "/app/claude_worker_server.py", "--cleanup"]
              env:
                - { name: HOME, value: /home/claude }
                - { name: PYTHONUNBUFFERED, value: "1" }
                - { name: PYTHONDONTWRITEBYTECODE, value: "1" }
                - { name: DEILE_CLAUDE_WORKER_ROOT, value: "/home/claude/work" }
                - { name: DEILE_CLAUDE_WORKER_LOG_LEVEL, value: "INFO" }
                # Retenção em dias — aumentar para ambientes com ciclos mais longos.
                - { name: DEILE_CLAUDE_CLEANUP_RETENTION_DAYS, value: "7" }
                # TTL de lease (deve ser igual ao do Deployment 50).
                - { name: DEILE_CLAUDE_LEASE_TTL_S, value: "30" }
              volumeMounts:
                - { name: claude-home, mountPath: /home/claude }
                - { name: tmp, mountPath: /tmp }
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                limits:   { cpu: "500m", memory: "512Mi" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                capabilities: { drop: ["ALL"] }
                seccompProfile: { type: RuntimeDefault }
          volumes:
            - name: claude-home
              persistentVolumeClaim:
                claimName: claude-worker-home
            - name: tmp
              emptyDir: { sizeLimit: "256Mi" }
