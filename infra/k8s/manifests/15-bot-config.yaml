# deilebot.yaml — mounted at /home/deile/config/deilebot.yaml (cwd-relative
# path the bot's settings loader looks at). Keeps owner identity in a
# stable form (`<provider>:<provider_user_id>`) so it survives the
# emptyDir wipe that drops the conversation DB on each Pod restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-config
  namespace: deile
data:
  deilebot.yaml: |
    foundation:
      data_retention_days: 90
      default_persona: developer
      intent_classifier: heuristic
      agent_bridge_mode: in_process
      agent_invocation_timeout_seconds: 120
      rate_limit_user_burst: 5
      rate_limit_user_refill_per_minute: 30
      rate_limit_global_concurrent: 16
      audit_log_to_file: true
      metrics_enabled: true
      session_strategy: per_user

    permissions:
      # `<provider>:<provider_user_id>` form — stable across deployments.
      # The patched _is_in() check accepts both this and the random
      # bot_user_id ULID.
      owners:
        - "discord:1475913578648436909"
      allowlist_invoke_agent: ["*"]
      blocklist: []
      per_action:
        EXECUTE_TOOL: { mode: owner_only }
        SEND_DM:      { mode: owner_only }
        ADMIN_COMMAND: { mode: owner_only }
        DEBUG_COMMAND: { mode: owner_only }

    personas:
      default: developer
      rules:
        - when: { provider: discord, scope: DM }
          use: discord_developer
        - when: { provider: discord, scope: GROUP }
          use: developer

    providers:
      enabled_providers: ["discord"]
