# deilebot.yaml — mounted at /home/deile/config/deilebot.yaml (cwd-relative
# path the bot's settings loader looks at). Keeps owner identity in a
# stable form (`<provider>:<provider_user_id>`) so it survives the
# emptyDir wipe that drops the conversation DB on each Pod restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-config
  namespace: deile
data:
  deilebot.yaml: |
    foundation:
      data_retention_days: 90
      default_persona: developer
      intent_classifier: heuristic
      agent_bridge_mode: in_process
      # Bot model (forced). deepseek-v4-flash (tier-3) alucinava resultado
      # de dev — fabricava "arquivo criado / py_compile exit 0" sem chamar
      # dispatch_deile_task. Trocado para v4-pro (tier-1, mesmo provider,
      # mais barato que Anthropic/OpenAI) — issue de cognição do bot.
      forced_model: "deepseek:deepseek-v4-pro"
      # Worker dispatches can take up to ~10 min (worker_server.TASK_TIMEOUT_S=600).
      # Add headroom so the bot's bridge does not time out before the worker.
      agent_invocation_timeout_seconds: 660
      rate_limit_user_burst: 5
      rate_limit_user_refill_per_minute: 30
      rate_limit_global_concurrent: 16
      audit_log_to_file: true
      metrics_enabled: true
      session_strategy: per_user

    permissions:
      # `<provider>:<provider_user_id>` form — stable across deployments.
      # The patched _is_in() check accepts both this and the random
      # bot_user_id ULID.
      # Operator's Discord user ID (right-click your name → Copy User ID
      # in Discord with Developer Mode on). Stable across deployments.
      owners:
        - "discord:1475913578648436909"
      allowlist_invoke_agent: ["*"]
      blocklist: []
      per_action:
        EXECUTE_TOOL: { mode: owner_only }
        SEND_DM:      { mode: owner_only }
        ADMIN_COMMAND: { mode: owner_only }
        DEBUG_COMMAND: { mode: owner_only }

    personas:
      default: developer
      rules:
        - when: { provider: discord, scope: DM }
          use: discord_developer
        - when: { provider: discord, scope: GROUP }
          use: developer

    providers:
      enabled_providers: ["discord"]

    # Allowlist of repos que deile-shell pode clonar via git. Globs seguem
    # as regras de fnmatch do Python. A lista é aplicada pelo guard
    # ~/bin/git instalado pelo wrapper.py no startup. A entrada única "*" é
    # a open policy documentada — qualquer repo que a credencial alcance é
    # permitido (necessário para o bot clonar repositórios públicos
    # arbitrários pedidos via Discord).
    git_integration:
      clonable_repos:
        - "*"

    # Login GitHub via Discord (/github_login). O método PAT funciona sem
    # configuração. O método OAuth (device flow) precisa de um GitHub OAuth
    # App registrado — cole o Client ID abaixo (o Client ID é público, não
    # é segredo). Vazio mantém o OAuth desativado; o PAT continua funcionando.
    github:
      oauth_client_id: ""
      oauth_scope: "repo"
