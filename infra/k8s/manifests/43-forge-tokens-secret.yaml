# Forge tokens guidance (issue #297)
# =====================================================================
# DEILE consumes forge tokens via the existing ``deile-secrets`` Secret
# (mounted at /run/secrets/deile in every pod). To enable GitLab support
# you add ONE new key to that Secret: ``GITLAB_TOKEN``. The wrapper.py
# bootstrap already loads every file under /run/secrets/deile/ as an env
# var, so no manifest change is required — the Secret payload alone
# decides which forge(s) are active.
#
#   GitHub-only deployment  → populate GITHUB_TOKEN  in deile-secrets.
#   GitLab-only deployment  → populate GITLAB_TOKEN  in deile-secrets.
#   Dual-forge deployment   → populate BOTH         in deile-secrets.
#
# The pipeline pod refuses to start if neither token is present.
#
# To add (or rotate) the GitLab token without touching GitHub:
#
#   GL_PAT=$(read -sp 'GitLab PAT: ' x && echo "$x")
#   kubectl -n deile patch secret deile-secrets \
#     -p "{\"stringData\":{\"GITLAB_TOKEN\":\"${GL_PAT}\"}}"
#
# Required token scopes:
#   GITHUB_TOKEN — repo (full); workflow if the pipeline labels PRs.
#   GITLAB_TOKEN — api, read_repository, write_repository.
#
# This file remains as documentation only; applying it is a no-op. A
# placeholder Secret is intentionally NOT defined here so that operators
# never accidentally overwrite an existing deile-secrets payload by
# running ``kubectl apply -f .`` over the whole manifests/ directory.
---
# Empty document — see header for the canonical way to add GITLAB_TOKEN.
