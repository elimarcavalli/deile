[pytest]
# Diretórios de teste
testpaths = deile/tests deile_bot/tests

# Padrões de arquivos de teste
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Configurações de marcadores
markers =
    unit: marca testes unitários
    integration: marca testes de integração
    security: marca testes relacionados a segurança
    orchestration: marca testes do sistema de orquestração
    bash: marca testes das ferramentas bash
    ui: marca testes da interface de usuário
    slow: marca testes que são lentos
    perf: performance benchmark tests
    e2e: end-to-end tests (FakeProviderAdapter + serviços reais)
    e2e_discord_live: live Discord E2E tests (require credentials)
    e2e_telegram_live: live Telegram E2E tests
    e2e_whatsapp_live: live WhatsApp E2E tests
    e2e_meta_live: live Meta E2E tests
    manual: testes que devem ser invocados manualmente

# Configurações de output
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes
    --durations=10

# Diretórios a ignorar
norecursedirs = .git .tox htmlcov env venv

# Configuração de timeout (requires pytest-timeout — disabled until installed)
# timeout = 300

# Configuração para testes assíncronos
asyncio_mode = auto

# Filtros de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*google.*:UserWarning