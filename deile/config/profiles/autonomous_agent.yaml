# Default profile (see ``profile_name = "autonomous_agent"`` in
# ``deile/config/settings.py``).
#
# Profile YAMLs are loaded by ``_apply_profile_layer`` and only keys present
# in ``_JSON_FIELD_MAP`` (deile/config/settings.py) are applied to Settings;
# everything else is silently ignored. Issue #139 removed ~50 dead keys that
# described capabilities the code did not deliver — keep this file aligned
# with the field map: any key added here must also have an entry in
# ``_JSON_FIELD_MAP`` or it will be a no-op again.

security:
  sandbox_code_execution: true
