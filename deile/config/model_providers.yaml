# Multi-Provider Model Router configuration.
# API keys are NEVER stored here — only the name of the environment variable.
#
# Pricing/context-window/capabilities verificados em 2026-05-25 contra:
#   - Anthropic:  https://platform.claude.com/docs/en/about-claude/pricing
#                 https://platform.claude.com/docs/en/about-claude/models/overview
#   - OpenAI:     https://developers.openai.com/api/docs/models/<id>
#   - Gemini:     https://ai.google.dev/gemini-api/docs/pricing + .../models
#   - DeepSeek:   https://api-docs.deepseek.com/quick_start/pricing

version: 1
default_strategy: task_optimized   # task_optimized | cost_optimized

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: null                  # SDK default
    enabled: true
    timeout_seconds: 120
    sdk_kwargs:
      default_headers:
        anthropic-beta: prompt-caching-2024-07-31

  openai:
    api_key_env: OPENAI_API_KEY
    base_url: null
    enabled: true
    timeout_seconds: 120
    sdk_kwargs: {}

  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    enabled: true
    timeout_seconds: 120
    sdk_kwargs: {}

  gemini:
    api_key_env: GOOGLE_API_KEY
    base_url: null
    enabled: true
    timeout_seconds: 120
    sdk_kwargs: {}

  # OpenRouter — gateway OpenAI-compatible (uma chave → todos os modelos).
  # Reusa o adapter OpenAI (OpenRouterProvider é subclasse fina). Os headers
  # HTTP-Referer/X-Title são best-effort (ranking/atribuição na OpenRouter; não
  # obrigatórios). PRIVACIDADE: o OpenRouter roteia o prompt para provedores
  # terceiros (Anthropic, OpenAI, Google, DeepSeek, etc.) — os dados passam por
  # um hop adicional. Aceitável para código do projeto; ver DECISOES.md #50.
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    enabled: true
    timeout_seconds: 120
    sdk_kwargs:
      default_headers:
        HTTP-Referer: https://github.com/elimarcavalli/deile
        X-Title: DEILE

models:
  # === ANTHROPIC ===
  # Context window 1M aplica-se a Opus 4.8, Opus 4.6 e Sonnet 4.6 (standard pricing).
  # Haiku 4.5 permanece em 200k. Todos suportam vision.
  - provider_id: anthropic
    model_id: claude-opus-4-8
    tier: tier_1
    label: flagship
    display_name: Claude Opus 4.8
    pricing: { input_per_1m_usd: 5.00, output_per_1m_usd: 25.00, cached_input_per_1m_usd: 0.50 }
    context_window: 1000000
    capabilities: [function_calling, streaming, caching, vision, adaptive_thinking]

  - provider_id: anthropic
    model_id: claude-sonnet-4-6
    tier: tier_2
    label: balanced
    display_name: Claude Sonnet 4.6
    pricing: { input_per_1m_usd: 3.00, output_per_1m_usd: 15.00, cached_input_per_1m_usd: 0.30 }
    context_window: 1000000
    capabilities: [function_calling, streaming, caching, vision, extended_thinking, adaptive_thinking]

  - provider_id: anthropic
    model_id: claude-haiku-4-5
    tier: tier_3
    label: fast
    display_name: Claude Haiku 4.5
    pricing: { input_per_1m_usd: 1.00, output_per_1m_usd: 5.00, cached_input_per_1m_usd: 0.10 }
    context_window: 200000
    capabilities: [function_calling, streaming, caching, vision, extended_thinking]

  # === OPENAI ===
  - provider_id: openai
    model_id: gpt-5.5
    tier: tier_1
    label: flagship
    display_name: GPT-5.5
    pricing: { input_per_1m_usd: 5.00, output_per_1m_usd: 30.00, cached_input_per_1m_usd: 0.50 }
    context_window: 1050000
    capabilities: [function_calling, streaming, caching, vision, reasoning]

  - provider_id: openai
    model_id: gpt-5.4
    tier: tier_2
    label: balanced
    display_name: GPT-5.4
    pricing: { input_per_1m_usd: 2.50, output_per_1m_usd: 15.00, cached_input_per_1m_usd: 0.25 }
    context_window: 1050000
    capabilities: [function_calling, streaming, caching, vision, reasoning]

  - provider_id: openai
    model_id: gpt-5.4-mini
    tier: tier_3
    label: fast
    display_name: GPT-5.4 Mini
    pricing: { input_per_1m_usd: 0.75, output_per_1m_usd: 4.50, cached_input_per_1m_usd: 0.075 }
    context_window: 400000
    capabilities: [function_calling, streaming, caching, vision, reasoning]

  - provider_id: openai
    model_id: gpt-5.4-nano
    tier: tier_4
    label: ultra-cheap
    display_name: GPT-5.4 Nano
    pricing: { input_per_1m_usd: 0.20, output_per_1m_usd: 1.25, cached_input_per_1m_usd: 0.02 }
    context_window: 400000
    capabilities: [function_calling, streaming, caching, vision, reasoning]

  # === GEMINI ===
  # Gemini 3.1 Pro Preview tem pricing tiered: ≤200k = $2/$12/$0.20; >200k = $4/$18/$0.40.
  # Aqui o tier ≤200k é o default; o orchestrator deve aplicar multiplicador 2x acima de 200k.
  - provider_id: gemini
    model_id: gemini-3.1-pro-preview
    tier: tier_1
    label: flagship
    display_name: Gemini 3.1 Pro Preview
    pricing: { input_per_1m_usd: 2.00, output_per_1m_usd: 12.00, cached_input_per_1m_usd: 0.20 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-2.5-pro
    tier: tier_1
    label: flagship-stable
    display_name: Gemini 2.5 Pro
    pricing: { input_per_1m_usd: 1.25, output_per_1m_usd: 10.00, cached_input_per_1m_usd: 0.125 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-3.5-flash
    tier: tier_2
    label: balanced
    display_name: Gemini 3.5 Flash
    pricing: { input_per_1m_usd: 1.50, output_per_1m_usd: 9.00, cached_input_per_1m_usd: 0.15 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-3-flash-preview
    tier: tier_2
    label: balanced
    display_name: Gemini 3 Flash Preview
    pricing: { input_per_1m_usd: 0.50, output_per_1m_usd: 3.00, cached_input_per_1m_usd: 0.05 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-3.1-flash-lite
    tier: tier_3
    label: fast
    display_name: Gemini 3.1 Flash-Lite
    pricing: { input_per_1m_usd: 0.25, output_per_1m_usd: 1.50, cached_input_per_1m_usd: 0.025 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-2.5-flash
    tier: tier_3
    label: balanced-stable
    display_name: Gemini 2.5 Flash
    pricing: { input_per_1m_usd: 0.30, output_per_1m_usd: 2.50, cached_input_per_1m_usd: 0.03 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  - provider_id: gemini
    model_id: gemini-2.5-flash-lite
    tier: tier_3
    label: ultra-fast
    display_name: Gemini 2.5 Flash-Lite
    pricing: { input_per_1m_usd: 0.10, output_per_1m_usd: 0.40, cached_input_per_1m_usd: 0.01 }
    context_window: 1048576
    capabilities: [function_calling, streaming, caching, vision, thinking]

  # === DEEPSEEK ===
  # ATENÇÃO: deepseek-v4-pro e v4-flash estão sob promo de -75% no off-peak.
  # Pre-promo (tabela): v4-pro $1.74/$3.48; v4-flash $0.56/$1.12.
  # Pós-promo (atual): v4-pro $0.435/$0.87; v4-flash $0.14/$0.28.
  # Cache hit: v4-pro $0.003625; v4-flash $0.0028.
  # deepseek-chat e deepseek-reasoner serão deprecados — usar v4-flash (thinking mode = reasoner).
  - provider_id: deepseek
    model_id: deepseek-v4-pro
    tier: tier_1
    label: flagship-cheap
    display_name: DeepSeek V4 Pro
    pricing: { input_per_1m_usd: 0.435, output_per_1m_usd: 0.87, cached_input_per_1m_usd: 0.003625 }
    context_window: 1000000
    capabilities: [function_calling, streaming, caching, json_output, thinking]

  - provider_id: deepseek
    model_id: deepseek-v4-flash
    tier: tier_3
    label: ultra-cheap
    display_name: DeepSeek V4 Flash
    pricing: { input_per_1m_usd: 0.14, output_per_1m_usd: 0.28, cached_input_per_1m_usd: 0.0028 }
    context_window: 1000000
    capabilities: [function_calling, streaming, caching, json_output, thinking]

  # === OPENROUTER (gateway OpenAI-compatible) ===
  # model_id segue o formato vendor/model do OpenRouter (o ':' separa provider_id
  # do model_id; o '/' fica intacto no model_id — ver _MODEL_SLUG_RE). O custo
  # AUTORITATIVO vem do campo usage.cost da resposta (OR5); a pricing abaixo é
  # FALLBACK quando a API não reporta custo. Valores OpenRouter ~2026-06; o
  # markup/roteamento dinâmico do OpenRouter pode divergir — por isso o custo
  # reportado pela resposta tem prioridade.
  - provider_id: openrouter
    model_id: deepseek/deepseek-chat
    tier: tier_3
    label: ultra-cheap
    display_name: DeepSeek Chat (OpenRouter)
    pricing: { input_per_1m_usd: 0.28, output_per_1m_usd: 0.88 }
    context_window: 163840
    capabilities: [function_calling, streaming, json_output]

  - provider_id: openrouter
    model_id: deepseek/deepseek-reasoner
    tier: tier_3
    label: cheap-reasoning
    display_name: DeepSeek Reasoner (OpenRouter)
    pricing: { input_per_1m_usd: 0.55, output_per_1m_usd: 2.19 }
    context_window: 163840
    capabilities: [function_calling, streaming, json_output, thinking]

  # deepseek-v4 via OpenRouter (rota da frota CLI com chave única). v4-pro também
  # existe via provider DeepSeek direto (deepseek:deepseek-v4-pro); estas entradas
  # adicionam a rota OpenRouter p/ os CLI workers (opencode/aider/goose) usarem.
  - provider_id: openrouter
    model_id: deepseek/deepseek-v4-pro
    tier: tier_1
    label: deepseek-pro
    display_name: DeepSeek V4 Pro (OpenRouter)
    pricing: { input_per_1m_usd: 0.435, output_per_1m_usd: 0.870 }
    context_window: 1048576
    capabilities: [function_calling, streaming, json_output, thinking]

  - provider_id: openrouter
    model_id: deepseek/deepseek-v4-flash
    tier: tier_4
    label: ultra-cheap
    display_name: DeepSeek V4 Flash (OpenRouter)
    pricing: { input_per_1m_usd: 0.098, output_per_1m_usd: 0.197 }
    context_window: 1048576
    capabilities: [function_calling, streaming, json_output, thinking]

  - provider_id: openrouter
    model_id: qwen/qwen3-coder
    tier: tier_3
