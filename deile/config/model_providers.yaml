    pricing: { input_per_1m_usd: 0.30, output_per_1m_usd: 2.50 }
    context_window: 1048576
    capabilities: [function_calling, streaming, vision, thinking]

  - provider_id: openrouter
    model_id: anthropic/claude-sonnet-4.6
    tier: tier_2
    label: premium
    display_name: Claude Sonnet 4.6 (OpenRouter)
    pricing: { input_per_1m_usd: 3.00, output_per_1m_usd: 15.00 }
    context_window: 1000000
    capabilities: [function_calling, streaming, vision, extended_thinking]

  - provider_id: openrouter
    model_id: openai/gpt-5.5
    tier: tier_1
    label: premium
    display_name: GPT-5.5 (OpenRouter)
    pricing: { input_per_1m_usd: 5.00, output_per_1m_usd: 30.00 }
    context_window: 1050000
