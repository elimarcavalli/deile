# Modelo padrão para todas as requests. Formato: "provider:model_id"
# Exemplos: "deepseek:deepseek-v4-flash", "anthropic:claude-haiku-4-5", "openai:gpt-5.4-mini"
# Use null para ativar o roteamento automático por tier (task_optimized / cost_optimized)
# default_model: deepseek:deepseek-v4-flash
# default_model: anthropic:claude-haiku-4-5
default_model: openai:gpt-5.4-mini

gemini:
  generation_config:
    candidate_count: 1
    max_output_tokens: 16384
    stop_sequences: []
    temperature: 0.2
    top_k: 1
    top_p: 1
  model_name: gemini-2.5-flash-lite
  safety_settings:
  - category: HARM_CATEGORY_HARASSMENT
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_HATE_SPEECH
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
    threshold: BLOCK_MEDIUM_AND_ABOVE
  - category: HARM_CATEGORY_DANGEROUS_CONTENT
    threshold: BLOCK_MEDIUM_AND_ABOVE
  tool_config:
    function_calling_config:
      mode: AUTO
